  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",

</head>
<body class="bg-gray-900 text-white min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, memo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously } from 'firebase/auth';
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDocs, query, where } from 'firebase/firestore';
    import { Clock, History, Activity, Trash2, ShieldAlert, Crosshair, Skull, UserCog, Users, MapPin, ChevronDown, ChevronUp, Search, Image as ImageIcon, Upload, Edit2, X, Flame, RefreshCw, CheckCircle, Server, LogOut, KeyRound, Save, Star, Eye, EyeOff, Power, Ban, Moon, Settings } from 'lucide-react';

    const firebaseConfig = {
      apiKey: "AIzaSyD763KJlKWIEXHCjXcQD3WXxup7DPZbh7Y",
      authDomain: "wakubosstime.firebaseapp.com",
      projectId: "wakubosstime",
      storageBucket: "wakubosstime.firebasestorage.app",
      messagingSenderId: "1005300815484",
      appId: "1:1005300815484:web:2a7724c6f7f0e239839bf9"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    signInAnonymously(auth).catch(console.error);

    const CountdownTimer = memo(({ nextSpawnTime, maxSpawnTime }) => {
      const [now, setNow] = useState(Date.now());
      
      useEffect(() => {
        const timer = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(timer);
      }, []);

      if (nextSpawnTime === null || nextSpawnTime === undefined || nextSpawnTime === '') return <span className="text-gray-400">未知</span>;
      if (nextSpawnTime === 0) return <span className="font-mono tracking-wide text-green-400 font-bold drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]">🟢 確定重生</span>;
      
      const diffMin = nextSpawnTime - now;
      const diffMax = (maxSpawnTime || nextSpawnTime) - now;
      
      const pad = (n) => String(n).padStart(2, '0');
      const formatTime = (diff) => {
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        return `${pad(h)}:${pad(m)}:${pad(s)}`;
      };

      if (diffMin > 0) {
        return <span className="font-mono tracking-wide text-gray-300">{formatTime(diffMin)}</span>;
      } else if (diffMax > 0) {
        return <span className="font-mono tracking-wide text-yellow-400 font-bold drop-shadow-[0_0_5px_rgba(250,204,21,0.3)]">{formatTime(diffMax)}</span>;
      } else {
        return <span className="font-mono tracking-wide text-green-400 font-bold drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]">🟢 確定重生</span>;
      }
    });

    function AdminUserRow({ user, appUser, showMessage, requestConfirm }) {
      const [uName, setUName] = useState(user.username);
      const [uPwd, setUPwd] = useState(user.password);
      const [canClearStale, setCanClearStale] = useState(user.canClearStale || false);
      const [showPwd, setShowPwd] = useState(false);
      const isSelf = user.id === appUser.id;

      const handleSave = async () => {
        if (!uName.trim() || !uPwd.trim()) return showMessage('欄位不可空白', 'error');
        try {
          await updateDoc(doc(db, 'users', user.id), { 
            username: uName.trim(), 
            password: uPwd.trim(),
            canClearStale: canClearStale
          });
          showMessage(`已更新 ${uName} 的資料`, 'success');
        } catch (e) { showMessage('更新失敗', 'error'); }
      };

      const handleToggleStatus = async () => {
        if (isSelf) return showMessage('無法更改自己的狀態', 'error');
        const newStatus = user.status === 'approved' ? 'pending' : 'approved';
        await updateDoc(doc(db, 'users', user.id), { status: newStatus });
        showMessage(`已將 ${user.username} 設為 ${newStatus === 'approved' ? '開通' : '停權'}`, 'success');
      };

      const handleDeleteUser = async () => {
        if (isSelf) return showMessage('無法刪除自己的帳號', 'error');
        requestConfirm(`確定要永久刪除會員「${user.username}」嗎？此操作無法還原。`, async () => {
          try {
            await deleteDoc(doc(db, 'users', user.id));
            showMessage(`已刪除會員 ${user.username}`, 'success');
          } catch(e) {
            showMessage('刪除失敗', 'error');
          }
        });
      };

      return (
        <div className="flex flex-col md:flex-row items-center gap-3 p-3 bg-gray-900 border border-gray-700 rounded-xl hover:border-purple-500/50 transition-colors shrink-0">
          <div className="flex flex-col w-full md:w-[160px] shrink-0">
             <label className="text-[10px] text-gray-500 mb-0.5">帳號 (DC名稱)</label>
             <input type="text" value={uName} onChange={e=>setUName(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white text-sm focus:outline-none focus:border-purple-500" />
          </div>
          <div className="flex flex-col w-full md:w-[140px] shrink-0 relative">
             <label className="text-[10px] text-gray-500 mb-0.5">登入密碼</label>
             <div className="relative">
               <input type={showPwd ? "text" : "password"} value={uPwd} onChange={e=>setUPwd(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg pl-2.5 pr-8 py-1.5 text-white text-sm focus:outline-none focus:border-purple-500" />
               <button onClick={() => setShowPwd(!showPwd)} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200">
                 {showPwd ? <EyeOff className="w-4 h-4"/> : <Eye className="w-4 h-4"/>}
               </button>
             </div>
          </div>
          
          <div className="flex flex-col w-full md:w-auto md:ml-2">
            <label className="text-[10px] text-gray-500 mb-0.5">進階權限</label>
            <label className="flex items-center gap-1.5 cursor-pointer bg-gray-800 border border-gray-600 rounded-lg px-2.5 py-1.5 hover:border-purple-500 transition-colors">
              <input type="checkbox" checked={canClearStale} onChange={e=>setCanClearStale(e.target.checked)} className="w-3.5 h-3.5 accent-purple-500 rounded border-gray-600" />
              <span className="text-sm text-gray-300">清4hr紀錄</span>
            </label>
          </div>

          <div className="flex items-end gap-1.5 w-full md:w-auto mt-2 md:mt-0 md:pt-[18px]">
            <button onClick={handleSave} className="bg-gray-700 hover:bg-purple-600 text-white p-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="儲存修改"><Save className="w-4 h-4"/></button>
            {!isSelf && (
               <button onClick={handleDeleteUser} className="bg-gray-700 hover:bg-red-600 text-gray-300 hover:text-white p-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="刪除會員"><Trash2 className="w-4 h-4"/></button>
            )}
          </div>
          
          <div className="flex flex-1 items-end gap-2 w-full mt-2 md:mt-0 md:pt-[18px] md:justify-end">
             <button onClick={handleToggleStatus} disabled={isSelf} className={`px-3 py-1.5 rounded-lg text-xs font-bold w-full md:w-auto transition-colors ${user.status === 'approved' ? 'bg-green-600/20 text-green-400 border border-green-500/50 hover:bg-green-600/30' : 'bg-red-600/20 text-red-400 border border-red-500/50 hover:bg-red-600/30 animate-pulse'} disabled:opacity-50 disabled:grayscale`}>
               {user.status === 'approved' ? '🟢 已開通 (點擊停權)' : '🔴 審核中 (點擊開通)'}
             </button>
          </div>
        </div>
      );
    }

    function AuthScreen({ setAppUser, showMessage }) {
      const [isLogin, setIsLogin] = useState(true);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const trimmedUser = username.trim();
        if (!trimmedUser) return;
        setIsLoading(true);

        try {
          if (isLogin) {
            const q = query(collection(db, 'users'), where('username', '==', trimmedUser));
            const snap = await getDocs(q);
            
            if (snap.empty) {
              if (trimmedUser === '茶米' && password === 'zaza') {
                const docRef = await addDoc(collection(db, 'users'), {
                  username: '茶米', password: 'zaza', role: 'admin', status: 'approved', createdAt: Date.now(), canClearStale: true
                });
                const adminUser = { id: docRef.id, username: '茶米', role: 'admin', status: 'approved', canClearStale: true };
                localStorage.setItem('wakuboss_user_id', docRef.id);
                setAppUser(adminUser);
                showMessage('管理員帳號已自動建立並登入', 'success');
                return;
              }
              showMessage('找不到此帳號，請確認或前往註冊', 'error');
              setIsLoading(false);
              return;
            }

            let foundUser = null;
            snap.forEach(d => { if (d.data().password === password) foundUser = { id: d.id, ...d.data() }; });
            
            if (foundUser) {
              localStorage.setItem('wakuboss_user_id', foundUser.id);
              setAppUser(foundUser);
              showMessage(`歡迎回來，${foundUser.username}`, 'success');
            } else {
              showMessage('密碼錯誤', 'error');
            }
          } else {
            const q = query(collection(db, 'users'), where('username', '==', trimmedUser));
            const snap = await getDocs(q);
            if (!snap.empty) {
              showMessage('此帳號已被註冊', 'error');
              setIsLoading(false);
              return;
            }

            const pass = password || '1234'; 
            const isAdmin = trimmedUser === '茶米' && pass === 'zaza';
            
            const newUser = {
              username: trimmedUser,
              password: pass,
              role: isAdmin ? 'admin' : 'user',
              status: isAdmin ? 'approved' : 'pending',
              canClearStale: isAdmin ? true : false,
              createdAt: Date.now(),
              forceKicked: false,
              forceRefresh: false
            };

            const docRef = await addDoc(collection(db, 'users'), newUser);
            localStorage.setItem('wakuboss_user_id', docRef.id);
            setAppUser({ id: docRef.id, ...newUser });
            showMessage(isAdmin ? '管理員註冊成功' : '註冊成功，請等待管理員開通', 'success');
          }
        } catch (error) {
          console.error(error);
          showMessage('發生錯誤，請確認網路連線或資料庫權限', 'error');
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 w-full max-w-md animate-in zoom-in-95 duration-300">
            <div className="flex flex-col items-center mb-8">
              <div className="w-20 h-20 mb-4 bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-700 overflow-hidden shadow-lg">
                <img src="./logo2.png" alt="Logo" className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
              </div>
              <h1 className="text-2xl font-bold text-white tracking-wide">Waku野王重生計時</h1>
              <p className="text-gray-400 mt-2">{isLogin ? '登入以繼續使用' : '註冊新帳號'}</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm text-gray-400 mb-1">帳號</label>
                <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder={isLogin ? "請輸入帳號" : "建議填寫 DC 名稱"} className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" required />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">密碼</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder={isLogin ? "請輸入密碼" : "未填寫則預設為 1234"} className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
              </div>
              
              <button type="submit" disabled={isLoading} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/30 flex justify-center items-center gap-2 mt-4 disabled:opacity-50">
                {isLoading && <Activity className="w-5 h-5 animate-spin" />}
                {isLogin ? '登入' : '註冊'}
              </button>
            </form>

            <div className="mt-6 text-center text-gray-400 text-sm">
              {isLogin ? '還沒有帳號嗎？' : '已經有帳號了？'}
              <button onClick={() => { setIsLogin(!isLogin); setUsername(''); setPassword(''); }} className="text-blue-400 hover:text-blue-300 ml-2 font-medium underline underline-offset-4 transition-colors">
                {isLogin ? '立即註冊' : '返回登入'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function PendingScreen({ onLogout }) {
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 text-center max-w-sm animate-in fade-in duration-500">
            <UserCog className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
            <h2 className="text-xl font-bold text-white mb-2">帳號審核中</h2>
            <p className="text-gray-400 mb-8 leading-relaxed">您的帳號尚未開通或處於停權狀態。<br/>若系統維護中也可能暫時顯示此畫面，請耐心等候。</p>
            <button onClick={onLogout} className="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2.5 rounded-xl font-medium transition-colors flex items-center justify-center gap-2 mx-auto">
              <LogOut className="w-4 h-4" /> 登出並返回
            </button>
          </div>
        </div>
      );
    }

    function MainApp({ appUser, onLogout, showMessage }) {
      const isAdmin = appUser.role === 'admin';
      
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });
      const requestConfirm = (message, onConfirm) => {
        setConfirmDialog({ isOpen: true, message, onConfirm });
      };

      const [bossTemplates, setBossTemplates] = useState([]);
      const [activeBosses, setActiveBosses] = useState([]);
      const [allUsers, setAllUsers] = useState([]); 
      
      const [isSleeping, setIsSleeping] = useState(false);
      const [uiTick, setUiTick] = useState(0);
      const [sysSettings, setSysSettings] = useState({ autoClearEnabled: false, autoClearHours: 4, autoClearInterval: 1 });

      const [activeModalBossId, setActiveModalBossId] = useState(() => localStorage.getItem('wakuboss_active_modal') || null); 
      const [modalPage, setModalPage] = useState(1); 
      const [adminTab, setAdminTab] = useState('home'); 
      const [showPwdModal, setShowPwdModal] = useState(false);
      const [newPwd, setNewPwd] = useState('');
      const [patrolModalData, setPatrolModalData] = useState(null); 
      const [expandedMemoId, setExpandedMemoId] = useState(null); 
      const [isReportFormCollapsed, setIsReportFormCollapsed] = useState(() => localStorage.getItem('wakuboss_form_collapsed') === 'true');
      
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTemplateId, setSelectedTemplateId] = useState('');
      const [channelInput, setChannelInput] = useState('');
      const [memoInput, setMemoInput] = useState('');
      const [killTimeInput, setKillTimeInput] = useState('');
      const [killDateSelect, setKillDateSelect] = useState('today');

      const [modalChannelInput, setModalChannelInput] = useState('');
      const [modalMemoInput, setModalMemoInput] = useState('');
      const [modalKillTimeInput, setModalKillTimeInput] = useState('');
      const [modalKillDateSelect, setModalKillDateSelect] = useState('today');

      const [pinnedBosses, setPinnedBosses] = useState(() => {
        const saved = localStorage.getItem(`wakuboss_pinned_${appUser.id}`);
        return saved ? JSON.parse(saved) : [];
      });
      
      const [localPatrols, setLocalPatrols] = useState(() => {
        const saved = localStorage.getItem(`wakuboss_local_patrols_${appUser.id}`);
        return saved ? JSON.parse(saved) : {};
      });

      const [bossSort, setBossSort] = useState(() => localStorage.getItem('wakuboss_sort') || 'levelAsc'); 
      const [adminSortOrder, setAdminSortOrder] = useState('levelDesc'); 
      const [newTemplateName, setNewTemplateName] = useState('');
      const [newTemplateLevel, setNewTemplateLevel] = useState('');
      const [newTemplateMinCD, setNewTemplateMinCD] = useState(60);
      const [newTemplateMaxCD, setNewTemplateMaxCD] = useState(60);
      const [newTemplateImage, setNewTemplateImage] = useState(null);
      const [newTemplateEnablePatrol, setNewTemplateEnablePatrol] = useState(false);

      const [isAddingTemplate, setIsAddingTemplate] = useState(false);
      const [editingTemplateId, setEditingTemplateId] = useState(null);
      const [showBossForm, setShowBossForm] = useState(true);
      const [showUserList, setShowUserList] = useState(true);
      const [isReporting, setIsReporting] = useState(false);
      const [isResettingGlobal, setIsResettingGlobal] = useState(false);
      const [globalBaseTime, setGlobalBaseTime] = useState(''); 
      const [staleClearHours, setStaleClearHours] = useState(4);

      useEffect(() => {
        if (activeModalBossId) localStorage.setItem('wakuboss_active_modal', activeModalBossId);
        else localStorage.removeItem('wakuboss_active_modal');
      }, [activeModalBossId]);

      useEffect(() => {
        localStorage.setItem('wakuboss_sort', bossSort);
      }, [bossSort]);

      useEffect(() => {
        localStorage.setItem('wakuboss_form_collapsed', isReportFormCollapsed);
      }, [isReportFormCollapsed]);

      useEffect(() => {
        const timer = setInterval(() => setUiTick(t => t + 1), 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        let idleTimer;
        const resetIdleTimer = () => {
          if (isSleeping) return; 
          clearTimeout(idleTimer);
          idleTimer = setTimeout(() => {
            setIsSleeping(true);
          }, 30 * 60 * 1000);
        };

        const handleVisibilityChange = () => {
          if (document.visibilityState === 'visible') {
            resetIdleTimer();
          }
        };

        resetIdleTimer();

        window.addEventListener('mousedown', resetIdleTimer);
        window.addEventListener('keydown', resetIdleTimer);
        window.addEventListener('touchstart', resetIdleTimer);
        window.addEventListener('scroll', resetIdleTimer, true);
        document.addEventListener('visibilitychange', handleVisibilityChange);

        return () => {
          clearTimeout(idleTimer);
          window.removeEventListener('mousedown', resetIdleTimer);
          window.removeEventListener('keydown', resetIdleTimer);
          window.removeEventListener('touchstart', resetIdleTimer);
          window.removeEventListener('scroll', resetIdleTimer, true);
          document.removeEventListener('visibilitychange', handleVisibilityChange);
        };
      }, [isSleeping]);

      // 自動清潔邏輯 (已開放給所有在線用戶，不再限定 Admin)
      useEffect(() => {
        if (!sysSettings.autoClearEnabled || isSleeping) return;
        
        const checkIntervalMs = (sysSettings.autoClearInterval || 1) * 60 * 1000;
        
        const interval = setInterval(async () => {
          const now = Date.now();
          const limitMs = (sysSettings.autoClearHours || 4) * 60 * 60 * 1000;
          try {
             const snap = await getDocs(collection(db, 'activeBosses'));
             snap.forEach(docSnap => {
               const data = docSnap.data();
               const spawnTime = data.maxSpawn || data.nextSpawn;
               if (now - spawnTime >= limitMs) {
                 deleteDoc(docSnap.ref).catch(() => {});
               }
             });
          } catch(e) {}
        }, checkIntervalMs); 
        
        return () => clearInterval(interval);
      }, [sysSettings.autoClearEnabled, sysSettings.autoClearHours, sysSettings.autoClearInterval, isSleeping]);


      const parseKillTime = (timeStr, dateOption) => {
        if (!timeStr) return Date.now();
        const [hours, minutes, seconds = 0] = timeStr.split(':').map(Number);
        const nowObj = new Date();
        const inputDate = new Date(nowObj.getFullYear(), nowObj.getMonth(), nowObj.getDate(), hours, minutes, seconds);
        
        if (dateOption === 'yesterday') {
            inputDate.setDate(inputDate.getDate() - 1);
        } else {
            if (inputDate.getTime() > Date.now()) {
                inputDate.setDate(inputDate.getDate() - 1);
            }
        }
        return inputDate.getTime();
      };

      useEffect(() => {
        localStorage.setItem(`wakuboss_pinned_${appUser.id}`, JSON.stringify(pinnedBosses));
      }, [pinnedBosses, appUser.id]);

      const togglePin = (e, bossId) => {
        e.stopPropagation();
        setPinnedBosses(prev => {
          if (prev.includes(bossId)) return prev.filter(id => id !== bossId);
          return [...prev, bossId];
        });
      };

      const handleLocalPatrol = (activeId) => {
        setLocalPatrols(prev => {
          const next = { ...prev, [activeId]: Date.now() };
          localStorage.setItem(`wakuboss_local_patrols_${appUser.id}`, JSON.stringify(next));
          return next;
        });
        showMessage('已記錄個人巡邏 (不消耗讀取量)', 'success');
      };

      useEffect(() => {
        if (!activeModalBossId) {
          setModalChannelInput('');
          setModalMemoInput('');
          setModalKillTimeInput('');
          setModalKillDateSelect('today');
          setModalPage(1);
          setExpandedMemoId(null);
        }
      }, [activeModalBossId]);

      useEffect(() => {
        if (isSleeping) return; 

        const unsubSettings = onSnapshot(doc(db, 'settings', 'system'), (docSnap) => {
          if (docSnap.exists()) {
            setSysSettings(prev => ({ ...prev, ...docSnap.data() }));
          }
        });

        const unsubscribeTemplates = onSnapshot(collection(db, 'bossTemplates'), (snapshot) => {
          const templatesData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          setBossTemplates(templatesData);
        });

        const unsubscribeActive = onSnapshot(collection(db, 'activeBosses'), (snapshot) => {
          const activeData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          setActiveBosses(activeData);
        });

        let unsubscribeUsers = () => {};
        if (isAdmin) {
          unsubscribeUsers = onSnapshot(collection(db, 'users'), (snapshot) => {
            const usersData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            usersData.sort((a, b) => {
              if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
              return b.createdAt - a.createdAt;
            });
            setAllUsers(usersData);
          });
        }

        return () => {
          unsubSettings();
          unsubscribeTemplates();
          unsubscribeActive();
          unsubscribeUsers();
        };
      }, [isAdmin, isSleeping]); 

      const templateMap = useMemo(() => {
        const map = {};
        bossTemplates.forEach(t => map[t.id] = t);
        return map;
      }, [bossTemplates]);

      const filteredTemplates = useMemo(() => {
        let result = bossTemplates.filter(t => t.name.toLowerCase().includes(searchQuery.toLowerCase()));
        return result.sort((a, b) => (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name));
      }, [bossTemplates, searchQuery]);

      const sortedAdminTemplates = useMemo(() => {
        return [...bossTemplates].sort((a, b) => {
            if (adminSortOrder === 'levelDesc') return (b.level || 0) - (a.level || 0) || a.name.localeCompare(b.name);
            if (adminSortOrder === 'levelAsc') return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
            return a.name.localeCompare(b.name); 
        });
      }, [bossTemplates, adminSortOrder]);

      useEffect(() => {
        if (filteredTemplates.length > 0) {
          if (!filteredTemplates.find(t => t.id === selectedTemplateId)) {
            setSelectedTemplateId(filteredTemplates[0].id);
          }
        } else {
          setSelectedTemplateId('');
        }
      }, [filteredTemplates, selectedTemplateId]);

      const displayBosses = useMemo(() => {
        let processed = bossTemplates.map(template => {
          const channels = activeBosses.filter(b => b.templateId === template.id);
          let effectiveGlobalSpawn = null;
          let effectiveGlobalMaxSpawn = null;
          if (template.globalIsAlive) {
              effectiveGlobalSpawn = 0; effectiveGlobalMaxSpawn = 0;
          } else if (template.globalNextSpawn) {
              effectiveGlobalSpawn = template.globalNextSpawn;
              effectiveGlobalMaxSpawn = template.globalMaxSpawn || template.globalNextSpawn; 
          }

          let earliest = effectiveGlobalSpawn;
          let earliestMax = effectiveGlobalMaxSpawn;
          channels.forEach(ch => {
            if (earliest === null || ch.nextSpawn < earliest) {
                earliest = ch.nextSpawn;
                earliestMax = ch.maxSpawn || ch.nextSpawn;
            }
          });

          // 核心修復：hasRecord 僅依賴分流紀錄，與全域標記重生無關
          const hasRecord = channels.length > 0;

          return { ...template, channels, effectiveGlobalSpawn, effectiveGlobalMaxSpawn, earliestSpawn: earliest, earliestMaxSpawn: earliestMax, hasRecord };
        });

        if (bossSort === 'hasRecordOnly') {
          processed = processed.filter(b => pinnedBosses.includes(b.id) || b.hasRecord);
        }

        return processed.sort((a, b) => {
           const aPinned = pinnedBosses.includes(a.id);
           const bPinned = pinnedBosses.includes(b.id);
           
           if (aPinned && !bPinned) return -1;
           if (!aPinned && bPinned) return 1;

           if (bossSort === 'levelDesc') return (b.level || 0) - (a.level || 0) || a.name.localeCompare(b.name);
           if (bossSort === 'levelAsc' || bossSort === 'hasRecordOnly') return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
           
           const aCD = a.minCooldown || a.cooldownMinutes || Infinity;
           const bCD = b.minCooldown || b.cooldownMinutes || Infinity;
           
           if (aCD === bCD) {
               return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
           }
           
           return aCD - bCD;
        });
      }, [bossTemplates, activeBosses, bossSort, pinnedBosses, uiTick]); 

      const handleChangePassword = async (e) => {
        e.preventDefault();
        if (!newPwd.trim()) return;
        try {
          await updateDoc(doc(db, 'users', appUser.id), { password: newPwd.trim() });
          showMessage('密碼修改成功！', 'success');
          setShowPwdModal(false);
          setNewPwd('');
        } catch (err) {
          showMessage('密碼修改失敗', 'error');
        }
      };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 120;
            let width = img.width, height = img.height;
            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            setNewTemplateImage(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSaveTemplate = async (e) => {
        e.preventDefault();
        if (!newTemplateName.trim() || newTemplateMinCD <= 0) return;
        const minCD = Number(newTemplateMinCD);
        const maxCD = Number(newTemplateMaxCD) || minCD;
        const level = newTemplateLevel ? Number(newTemplateLevel) : null;
        if (maxCD < minCD) { showMessage("最大CD不能小於最小CD", "error"); return; }
        
        try {
          setIsAddingTemplate(true);
          const templateData = { 
            name: newTemplateName.trim(), 
            level: level,
            minCooldown: minCD,
            maxCooldown: maxCD,
            cooldownMinutes: minCD, 
            imageUrl: newTemplateImage,
            enablePatrol: newTemplateEnablePatrol
          };
          if (editingTemplateId) {
            await updateDoc(doc(db, 'bossTemplates', editingTemplateId), templateData);
            setEditingTemplateId(null);
            showMessage("種類修改成功", "success");
          } else {
            await addDoc(collection(db, 'bossTemplates'), { 
              ...templateData,
              createdBy: appUser.id, 
              createdAt: Date.now(), 
              globalNextSpawn: null, 
              globalIsAlive: false 
            });
            showMessage("種類新增成功", "success");
          }
          setNewTemplateName(''); setNewTemplateLevel(''); setNewTemplateMinCD(60); setNewTemplateMaxCD(60); setNewTemplateImage(null); setNewTemplateEnablePatrol(false);
        } catch (error) { showMessage("儲存失敗", "error"); } finally { setIsAddingTemplate(false); }
      };

      const handleCancelEdit = () => { setEditingTemplateId(null); setNewTemplateName(''); setNewTemplateLevel(''); setNewTemplateMinCD(60); setNewTemplateMaxCD(60); setNewTemplateImage(null); setNewTemplateEnablePatrol(false); };

      const handleEditClick = (template) => {
        setEditingTemplateId(template.id); 
        setNewTemplateName(template.name); 
        setNewTemplateLevel(template.level || '');
        setNewTemplateMinCD(template.minCooldown || template.cooldownMinutes || 60);
        setNewTemplateMaxCD(template.maxCooldown || template.cooldownMinutes || 60);
        setNewTemplateImage(template.imageUrl || null);
        setNewTemplateEnablePatrol(template.enablePatrol || false);
        setShowBossForm(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDeleteTemplate = async (templateId) => {
        requestConfirm("確定要刪除這個種類嗎？", async () => {
          try { await deleteDoc(doc(db, 'bossTemplates', templateId)); showMessage("刪除成功", "success"); } catch (error) { showMessage("刪除失敗", "error"); }
        });
      };

      const handleDeleteActiveBoss = async (activeId, isNoBoss = false) => {
        const msg = isNoBoss ? "確定此分流「無王」並刪除該筆紀錄嗎？" : "確定要刪除這筆分流計時紀錄嗎？";
        requestConfirm(msg, async () => {
          try { 
            await deleteDoc(doc(db, 'activeBosses', activeId)); 
            showMessage(isNoBoss ? "已標記無王並刪除紀錄" : "已刪除分流紀錄", "success"); 
          } catch(e) { 
            showMessage("刪除失敗", "error"); 
          }
        });
      };

      const handleResetAllBosses = async () => {
        requestConfirm("【警告】確定要重置所有王的計算時間，並清除目前所有的分流紀錄嗎？\n(將使用您輸入的基準時間計算)", async () => {
          try {
            setIsResettingGlobal(true);
            const baseTime = globalBaseTime ? new Date(globalBaseTime).getTime() : Date.now();
            const activeSnap = await getDocs(collection(db, 'activeBosses'));
            await Promise.all(activeSnap.docs.map(d => deleteDoc(d.ref)));
            await Promise.all(bossTemplates.map(t => updateDoc(doc(db, 'bossTemplates', t.id), { 
              globalNextSpawn: baseTime + ((t.minCooldown || t.cooldownMinutes) * 60 * 1000), 
              globalMaxSpawn: baseTime + ((t.maxCooldown || t.minCooldown || t.cooldownMinutes) * 60 * 1000), 
              globalIsAlive: false 
            })));
            showMessage("全伺服器王重生時間已重置！", "success");
          } catch (error) { showMessage("全域重置失敗", "error"); } finally { setIsResettingGlobal(false); }
        });
      };

      const handleGlobalResetSingle = async (template) => {
        try {
          const baseTime = globalBaseTime ? new Date(globalBaseTime).getTime() : Date.now();
          await updateDoc(doc(db, 'bossTemplates', template.id), { 
            globalNextSpawn: baseTime + ((template.minCooldown || template.cooldownMinutes) * 60 * 1000), 
            globalMaxSpawn: baseTime + ((template.maxCooldown || template.minCooldown || template.cooldownMinutes) * 60 * 1000), 
            globalIsAlive: false 
          }); 
          showMessage(`${template.name} 已開始全線倒數`, "success"); 
        } catch (e) { showMessage("設定失敗", "error"); }
      };

      const handleGlobalSpawnSingle = async (template) => {
        try { await updateDoc(doc(db, 'bossTemplates', template.id), { globalNextSpawn: 0, globalIsAlive: true }); showMessage(`${template.name} 已標記為全線重生`, "success"); } catch (e) { showMessage("設定失敗", "error"); }
      };

      const handleReportKill = async (e) => {
        e.preventDefault();
        if (!selectedTemplateId || !channelInput.trim()) return;
        const template = templateMap[selectedTemplateId];
        if (!template) return;
        try {
          setIsReporting(true);
          const activeBossId = `${template.id}_${channelInput.trim()}`.replace(/[^a-zA-Z0-9_]/g, '_');
          const killTime = parseKillTime(killTimeInput, killDateSelect);
          const minCD = template.minCooldown || template.cooldownMinutes || 60;
          const maxCD = template.maxCooldown || template.cooldownMinutes || 60;
          await setDoc(doc(db, 'activeBosses', activeBossId), {
            templateId: template.id, 
            bossName: template.name, 
            channel: channelInput.trim(), 
            memo: memoInput.trim(),
            cooldownMinutes: minCD, 
            maxCooldown: maxCD, 
            lastKilled: killTime, 
            nextSpawn: killTime + (minCD * 60 * 1000), 
            maxSpawn: killTime + (maxCD * 60 * 1000), 
            reportedBy: appUser.id, 
            reporterName: appUser.username,
            patrolHistory: [],
            isRekilled: false
          });
          setChannelInput(''); 
          setMemoInput('');
          setKillTimeInput('');
          setIsReportFormCollapsed(true);
          showMessage(`已成功回報 ${template.name} (${channelInput.trim()}頻)`, "success");
        } catch (error) { showMessage("錯誤: 通報失敗，請確認權限", "error"); } finally { setIsReporting(false); }
      };

      const handleModalQuickAdd = async (template) => {
        if (!modalChannelInput.trim()) return;
        try {
          setIsReporting(true);
          const activeBossId = `${template.id}_${modalChannelInput.trim()}`.replace(/[^a-zA-Z0-9_]/g, '_');
          const killTime = parseKillTime(modalKillTimeInput, modalKillDateSelect);
          const minCD = template.minCooldown || template.cooldownMinutes || 60;
          const maxCD = template.maxCooldown || template.cooldownMinutes || 60;
          await setDoc(doc(db, 'activeBosses', activeBossId), {
            templateId: template.id, 
            bossName: template.name, 
            channel: modalChannelInput.trim(), 
            memo: modalMemoInput.trim(),
            cooldownMinutes: minCD, 
            maxCooldown: maxCD, 
            lastKilled: killTime, 
            nextSpawn: killTime + (minCD * 60 * 1000), 
            maxSpawn: killTime + (maxCD * 60 * 1000), 
            reportedBy: appUser.id, 
            reporterName: appUser.username,
            patrolHistory: [],
            isRekilled: false
          });
          setModalChannelInput('');
          setModalMemoInput('');
          setModalKillTimeInput('');
          showMessage(`已成功回報 ${template.name} (${modalChannelInput.trim()}頻)`, "success");
        } catch (error) { showMessage("錯誤: 通報失敗，請確認權限", "error"); } finally { setIsReporting(false); }
      };

      const handleQuickReportKill = async (active) => {
        const template = templateMap[active.templateId];
        if (!template) return;
        requestConfirm(`確定要在 ${active.channel}頻 記錄「再次擊殺」${template.name} 嗎？\n(時間將重新計算)`, async () => {
          try {
            const minCD = template.minCooldown || template.cooldownMinutes || 60;
            const maxCD = template.maxCooldown || template.cooldownMinutes || 60;
            const killTime = Date.now();
            await updateDoc(doc(db, 'activeBosses', active.id), {
              cooldownMinutes: minCD,
              maxCooldown: maxCD,
              lastKilled: killTime,
              nextSpawn: killTime + (minCD * 60 * 1000),
              maxSpawn: killTime + (maxCD * 60 * 1000),
              reportedBy: appUser.id,
              reporterName: appUser.username,
              lastCheckedAt: null,
              lastCheckedByName: null,
              patrolHistory: [],
              isRekilled: true
            });
            showMessage(`已重新登記 ${template.name} (${active.channel}頻) 擊殺`, "success");
          } catch (e) {
            showMessage("重新登記失敗，請確認權限", "error");
          }
        });
      };

      const handleCheckChannel = async (active) => {
        const currentHistory = active.patrolHistory || [];
        const now = Date.now();
        
        if (currentHistory.length > 0) {
           const lastCheckTime = currentHistory[0].time;
           const diffMs = now - lastCheckTime;
           const cooldownMs = 5 * 60 * 1000; 
           
           if (diffMs < cooldownMs) {
               const remainMs = cooldownMs - diffMs;
               const remainMin = Math.floor(remainMs / 60000);
               const remainSec = Math.floor((remainMs % 60000) / 1000);
               return showMessage(`此頻道剛被巡邏過，請等 ${remainMin > 0 ? remainMin + '分' : ''}${remainSec}秒 後再試`, "error");
           }
        }

        try {
          const newRecord = { time: now, userName: appUser.username };
          const newHistory = [newRecord, ...currentHistory].slice(0, 3);
          
          await updateDoc(doc(db, 'activeBosses', active.id), {
            lastCheckedAt: now,
            lastCheckedByName: appUser.username,
            patrolHistory: newHistory
          });
          showMessage(`已記錄 ${active.channel}頻 巡邏簽到`, "success");
        } catch (e) {
          showMessage("記錄失敗，請確認權限", "error");
        }
      };

      const handleClearStaleRecords = async (group, hours) => {
        const currentNow = Date.now();
        const STALE_TIME_MS = hours * 60 * 60 * 1000;
        const staleRecords = group.channels.filter(ch => {
          const spawnTime = ch.maxSpawn || ch.nextSpawn;
          return (currentNow - spawnTime) >= STALE_TIME_MS;
        });

        if (staleRecords.length === 0) {
          showMessage(`目前沒有確定重生超過 ${hours} 小時的紀錄`, 'success');
          return;
        }

        requestConfirm(`確定要清除 ${staleRecords.length} 筆「確定重生」已超過 ${hours} 小時的分流紀錄嗎？`, async () => {
          try {
            setIsReporting(true);
            await Promise.all(staleRecords.map(ch => deleteDoc(doc(db, 'activeBosses', ch.id))));
            showMessage(`已成功清除 ${staleRecords.length} 筆過期紀錄`, 'success');
          } catch (error) {
            showMessage("清除失敗，請確認權限", "error");
          } finally {
            setIsReporting(false);
          }
        });
      };

      const handleUpdateSysSettings = async (newVals) => {
        try {
          await setDoc(doc(db, 'settings', 'system'), { ...sysSettings, ...newVals }, { merge: true });
          showMessage('全域系統設定已更新', 'success');
        } catch (e) {
          showMessage('設定更新失敗，請確認權限', 'error');
        }
      };

      const handleSuspendAll = () => {
        requestConfirm("確定要將【所有非管理員的會員】設為停權(審核中)嗎？\n這將強制他們(包含舊版本)退回首頁並中斷對資料庫的監聽。", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.role !== 'admin' && u.status === 'approved');
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { status: 'pending' })));
            showMessage(`已成功將 ${targets.length} 名會員轉為審核中`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      const handleApproveAll = () => {
        requestConfirm("確定要將所有【審核中】的會員開通嗎？", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.status === 'pending');
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { status: 'approved' })));
            showMessage(`已成功開通 ${targets.length} 名會員`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      const handleForceLogoutAll = () => {
        requestConfirm("確定要發送強制登出訊號給所有其他會員嗎？\n(注意：此功能僅對已更新至最新版程式碼的用戶有效)", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.id !== appUser.id);
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { forceKicked: true })));
            showMessage(`強制登出訊號已發送給 ${targets.length} 名會員`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      const handleForceRefreshAll = () => {
        requestConfirm("確定要發送「強制重新整理」訊號給所有在線用戶嗎？\n(新版用戶的網頁將會自動重整以獲取最新版本)", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.id !== appUser.id);
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { forceRefresh: true })));
            showMessage(`重新整理訊號已發送給 ${targets.length} 名會員`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      return (
        <div className="p-4 md:p-8 font-sans">
          {/* 休眠與彈窗邏輯 */}
          {isSleeping && (
            <div className="fixed inset-0 z-[999] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-500">
              <div className="bg-gray-800 p-8 rounded-3xl border border-gray-700 shadow-2xl flex flex-col items-center max-w-sm text-center animate-in zoom-in-95">
                <div className="w-20 h-20 bg-gray-900 rounded-full flex items-center justify-center mb-6 shadow-inner border border-gray-700">
                   <Moon className="w-10 h-10 text-blue-400 animate-pulse" />
                </div>
                <h2 className="text-2xl font-bold text-white mb-3 tracking-wide">系統已休眠</h2>
                <button onClick={() => setIsSleeping(false)} className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/50 hover:scale-105 active:scale-95">喚醒系統</button>
              </div>
            </div>
          )}

          {confirmDialog.isOpen && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 animate-in fade-in" onClick={() => !isReporting && setConfirmDialog({isOpen: false, message: '', onConfirm: null})}>
               <div className="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl max-w-sm w-full text-center" onClick={e=>e.stopPropagation()}>
                   <ShieldAlert className="w-12 h-12 text-yellow-500 mx-auto mb-4" />
                   <p className="text-white mb-6 text-base whitespace-pre-wrap leading-relaxed">{confirmDialog.message}</p>
                   <div className="flex justify-center gap-3">
                       <button onClick={() => setConfirmDialog({isOpen: false, message: '', onConfirm: null})} disabled={isReporting} className="px-5 py-2.5 rounded-xl bg-gray-700 hover:bg-gray-600 text-white font-medium flex-1 transition-colors disabled:opacity-50">取消</button>
                       <button 
                         onClick={async () => {
                           setIsReporting(true);
                           try { await confirmDialog.onConfirm(); } finally { setIsReporting(false); setConfirmDialog({isOpen: false, message: '', onConfirm: null}); }
                         }} 
                         disabled={isReporting}
                         className="px-5 py-2.5 rounded-xl bg-red-600 hover:bg-red-500 text-white font-medium flex-1 transition-colors disabled:opacity-50 flex justify-center items-center gap-2"
                       >
                         {isReporting ? <Activity className="w-4 h-4 animate-spin"/> : null}
                         確定執行
                       </button>
                   </div>
               </div>
            </div>
          )}

          {showPwdModal && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowPwdModal(false)}>
              <div className="bg-gray-800 p-6 rounded-2xl border border-gray-700 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><KeyRound className="w-5 h-5 text-blue-400"/> 修改個人密碼</h3>
                <form onSubmit={handleChangePassword}>
                  <label className="block text-sm text-gray-400 mb-1">新密碼</label>
                  <input type="text" value={newPwd} onChange={e=>setNewPwd(e.target.value)} placeholder="請輸入新密碼" className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-6" required />
                  <div className="flex gap-3">
                    <button type="button" onClick={() => setShowPwdModal(false)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-medium py-2.5 rounded-xl transition-colors">取消</button>
                    <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-xl transition-colors">確認儲存</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {patrolModalData && (() => {
            const active = activeBosses.find(b => b.id === patrolModalData.id) || patrolModalData;
            const history = active.patrolHistory || [];
            return (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 animate-in fade-in" onClick={() => setPatrolModalData(null)}>
                <div className="bg-gray-800 p-6 rounded-2xl border border-purple-500/50 shadow-[0_0_30px_rgba(168,85,247,0.15)] flex flex-col items-center gap-4 w-full max-w-[280px] animate-in zoom-in-95 duration-200" onClick={e=>e.stopPropagation()}>
                   <div className="w-14 h-14 bg-purple-900/40 rounded-full flex items-center justify-center mb-1"><Search className="w-7 h-7 text-purple-400" /></div>
                   <h4 className="font-bold text-white text-xl tracking-wide">{active.channel}頻 巡邏狀態</h4>
                   <div className="w-full bg-gray-900 rounded-xl p-4 text-sm text-gray-300 space-y-2 border border-gray-700">
                      {history.length === 0 ? <div className="text-center py-3 text-gray-500 text-xs">尚未有巡邏紀錄</div> : history.map((record, idx) => (
                        <div key={idx} className="flex justify-between items-center py-1">
                          <span className="font-medium text-gray-300 flex items-center gap-1.5"><Clock className="w-3.5 h-3.5" />{new Date(record.time).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false})}</span>
                          <span className="font-medium text-purple-300 truncate">{record.userName}</span>
                        </div>
                      ))}
                   </div>
                   <button onClick={() => handleCheckChannel(active)} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl transition-colors font-bold">在此分流簽到</button>
                </div>
              </div>
            );
          })()}

          {activeModalBossId && (() => {
            const group = displayBosses.find(g => g.id === activeModalBossId);
            if (!group) { setActiveModalBossId(null); return null; }
            const currentNow = Date.now();
            const warningCount = group.channels.filter(ch => { const diff = ch.nextSpawn - currentNow; return diff > 0 && diff <= 10 * 60 * 1000; }).length;
            return (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 animate-in fade-in">
                <div className="bg-gray-800 rounded-2xl border border-gray-700 w-full max-w-lg shadow-2xl flex flex-col max-h-[85vh] animate-in zoom-in-95 duration-200">
                  <div className="p-4 sm:p-5 border-b border-gray-700 flex items-center justify-between bg-gray-800/80 rounded-t-2xl shrink-0">
                    <div className="flex items-center gap-4">
                      <div className="flex shrink-0 w-12 h-12 rounded-xl bg-gray-900 items-center justify-center border overflow-hidden border-gray-700">
                        {group.imageUrl ? <img src={group.imageUrl} alt={group.name} className="w-full h-full object-cover" /> : <Skull className="text-gray-500" />}
                      </div>
                      <div className="flex flex-col">
                        <h3 className="text-lg font-bold text-white">{group.name}</h3>
                        <div className="text-sm mt-1 flex items-center gap-2"><span className="text-gray-400">最快重生:</span><CountdownTimer nextSpawnTime={group.earliestSpawn} maxSpawnTime={group.earliestMaxSpawn} /></div>
                      </div>
                    </div>
                    <button onClick={() => setActiveModalBossId(null)} className="p-2 bg-gray-900 hover:bg-gray-700 rounded-full"><X className="w-5 h-5" /></button>
                  </div>
                  <div className="p-4 sm:p-5 overflow-y-auto flex flex-col gap-3">
                    <form onSubmit={(e) => { e.preventDefault(); handleModalQuickAdd(group); }} className="flex flex-col gap-2 bg-gray-900/60 p-3 rounded-xl border border-gray-700">
                      <div className="flex gap-2">
                        <input type="number" min="1" value={modalChannelInput} onChange={e => setModalChannelInput(e.target.value)} placeholder="分流" className="w-20 bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white" required />
                        <input type="text" value={modalMemoInput} onChange={e => setModalMemoInput(e.target.value)} placeholder="備註" className="flex-1 bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white" />
                        <button type="submit" className="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-bold">登記</button>
                      </div>
                    </form>
                    {group.channels.length > 0 ? group.channels.sort((a,b)=>a.nextSpawn-b.nextSpawn).map(active => (
                      <div key={active.id} className="flex items-center justify-between p-3 bg-gray-800 border border-gray-700 rounded-lg">
                        <span className="font-bold text-blue-400">{active.channel}頻</span>
                        <CountdownTimer nextSpawnTime={active.nextSpawn} maxSpawnTime={active.maxSpawn} />
                        <div className="flex gap-2">
                           <button onClick={() => handleQuickReportKill(active)} className="text-xs bg-blue-600 px-2 py-1 rounded">⚔️擊殺</button>
                           <button onClick={() => handleDeleteActiveBoss(active.id)} className="text-xs bg-red-600 px-2 py-1 rounded">刪除</button>
                        </div>
                      </div>
                    )) : <p className="text-gray-500 text-center py-4">目前沒有分流紀錄</p>}
                  </div>
                </div>
              </div>
            );
          })()}

          <div className="max-w-6xl mx-auto space-y-6">
            <header className="flex items-center justify-between bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700">
               <h1 className="text-2xl font-bold">Waku野王計時</h1>
               <button onClick={onLogout} className="bg-red-600 hover:bg-red-500 px-4 py-2 rounded-lg font-bold">登出</button>
            </header>

            <section className="bg-gray-800 p-6 rounded-2xl border border-blue-500/30">
               <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Crosshair className="text-blue-400"/> 回報擊殺</h2>
               <form onSubmit={handleReportKill} className="flex flex-wrap gap-3">
                  <select value={selectedTemplateId} onChange={(e) => setSelectedTemplateId(e.target.value)} className="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-3" required>
                    {bossTemplates.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                  </select>
                  <input type="number" value={channelInput} onChange={e=>setChannelInput(e.target.value)} placeholder="分流" className="w-20 bg-gray-900 border border-gray-700 rounded-lg px-3 py-3" required />
                  <button type="submit" className="bg-blue-600 px-6 py-3 rounded-lg font-bold">開始倒數</button>
               </form>
            </section>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
              {displayBosses.map(group => {
                const isGlobalSpawned = group.effectiveGlobalSpawn === 0 || (group.effectiveGlobalMaxSpawn !== null && group.effectiveGlobalMaxSpawn <= Date.now());
                return (
                  <div key={group.id} onClick={() => setActiveModalBossId(group.id)} className={`bg-gray-800 p-4 rounded-2xl border ${isGlobalSpawned && group.channels.length === 0 ? 'border-green-500/40' : 'border-gray-700'} cursor-pointer hover:scale-[1.01] transition-transform`}>
                    <div className="flex justify-between items-center">
                       <h3 className="text-xl font-bold">{group.name}</h3>
                       {group.channels.length > 0 && <span className="text-xs bg-blue-900 text-blue-200 px-2 py-1 rounded">{group.channels.length} 分流</span>}
                    </div>
                    <div className="mt-2"><CountdownTimer nextSpawnTime={group.earliestSpawn} maxSpawnTime={group.earliestMaxSpawn} /></div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [appUser, setAppUser] = useState(null);
      const [isCheckingAuth, setIsCheckingAuth] = useState(true);
      const [alertMsg, setAlertMsg] = useState(null); 

      const showMessage = (text, type = 'error') => {
        setAlertMsg({ text, type });
        setTimeout(() => setAlertMsg(null), 5000);
      };

      useEffect(() => {
        const storedUserId = localStorage.getItem('wakuboss_user_id');
        if (!storedUserId) { setIsCheckingAuth(false); return; }
        const unsub = onSnapshot(doc(db, 'users', storedUserId), (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.forceRefresh) { updateDoc(doc(db, 'users', storedUserId), { forceRefresh: false }).then(() => window.location.reload()); }
            else if (data.forceKicked) { localStorage.removeItem('wakuboss_user_id'); setAppUser(null); updateDoc(doc(db, 'users', storedUserId), { forceKicked: false }); showMessage('已強制登出', 'error'); }
            else { setAppUser({ id: docSnap.id, ...data }); }
          } else { setAppUser(null); localStorage.removeItem('wakuboss_user_id'); }
          setIsCheckingAuth(false);
        });
        return () => unsub();
      }, []);

      const handleLogout = () => { localStorage.removeItem('wakuboss_user_id'); setAppUser(null); };

      return (
        <>
          {alertMsg && (
            <div className={`fixed top-4 right-4 z-[99] px-5 py-4 rounded-xl shadow-2xl flex items-center gap-4 ${alertMsg.type === 'success' ? 'bg-green-900' : 'bg-red-900'}`}>
              {alertMsg.text}
              <button onClick={() => setAlertMsg(null)}><X className="w-5 h-5"/></button>
            </div>
          )}
          {isCheckingAuth ? <div className="flex h-screen items-center justify-center"><Activity className="animate-spin w-12 h-12" /></div> : !appUser ? <AuthScreen setAppUser={setAppUser} showMessage={showMessage} /> : appUser.status === 'pending' ? <PendingScreen onLogout={handleLogout} /> : <MainApp appUser={appUser} onLogout={handleLogout} showMessage={showMessage} />}
        </>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
