              isRekilled: true
            });
            showMessage(`已重新登記 ${template.name} (${active.channel}頻) 擊殺`, "success");
          } catch (e) {
            showMessage("重新登記失敗，請確認權限", "error");
          }
        });
      };

      const handleCheckChannel = async (active) => {
        const currentHistory = active.patrolHistory || [];
        const now = Date.now();
        
        if (currentHistory.length > 0) {
           const lastCheckTime = currentHistory[0].time;
           const diffMs = now - lastCheckTime;
           const cooldownMs = 5 * 60 * 1000; 
           
           if (diffMs < cooldownMs) {
               const remainMs = cooldownMs - diffMs;
               const remainMin = Math.floor(remainMs / 60000);
               const remainSec = Math.floor((remainMs % 60000) / 1000);
               return showMessage(`此頻道剛被巡邏過，請等 ${remainMin > 0 ? remainMin + '分 ' : ''}${remainSec}秒 後再試`, "error");
           }
        }

        try {
          const newRecord = { time: now, userName: appUser.username };
          const newHistory = [newRecord, ...currentHistory].slice(0, 3);
          
          await updateDoc(doc(db, 'activeBosses', active.id), {
            lastCheckedAt: now,
            lastCheckedByName: appUser.username,
            patrolHistory: newHistory
          });
          showMessage(`已記錄 ${active.channel}頻 巡邏簽到`, "success");
        } catch (e) {
          showMessage("記錄失敗，請確認權限", "error");
        }
      };

      const handleClearAllRecords = async (group) => {
        if (group.channels.length === 0) {
          showMessage(`目前沒有紀錄可以清除`, 'success');
          return;
        }

        requestConfirm(`【危險操作】確定要清除「${group.name}」目前所有的 ${group.channels.length} 筆分流紀錄嗎？\n此動作無法復原！`, async () => {
          try {
            setIsReporting(true);
            await Promise.all(group.channels.map(ch => deleteDoc(doc(db, 'activeBosses', ch.id))));
            showMessage(`已成功清除 ${group.name} 的所有紀錄`, 'success');
            if (!pipWindow) setActiveModalBossId(null);
          } catch (error) {
            showMessage("清除失敗，請確認權限", "error");
          } finally {
            setIsReporting(false);
          }
        });
      };
      
      const handleClearStaleRecords = async (group, hours) => {
        if (!hours) return;
        const limitMs = hours * 60 * 60 * 1000;
        const now = Date.now();
        const targets = group.channels.filter(ch => (now - (ch.maxSpawn || ch.nextSpawn)) >= limitMs);

        if (targets.length === 0) {
          showMessage(`目前沒有超過 ${hours} 小時的過期紀錄`, 'success');
          return;
        }

        requestConfirm(`確定要清除 ${targets.length} 筆已過期超過 ${hours} 小時的紀錄嗎？`, async () => {
          try {
            setIsReporting(true);
            await Promise.all(targets.map(ch => deleteDoc(doc(db, 'activeBosses', ch.id))));
            showMessage(`已成功清除 ${targets.length} 筆過期紀錄`, 'success');
            if (!pipWindow && targets.length === group.channels.length) {
                setActiveModalBossId(null);
            }
          } catch (error) {
            showMessage("清除失敗，請確認權限", "error");
          } finally {
            setIsReporting(false);
          }
        });
      };

      const handleUpdateSysSettings = async (newVals) => {
        try {
          await setDoc(doc(db, 'settings', 'system'), { ...sysSettings, ...newVals }, { merge: true });
          showMessage('全域系統設定已更新', 'success');
        } catch (e) {
          showMessage('設定更新失敗，請確認權限', 'error');
        }
      };

      const handleSuspendAll = () => {
        requestConfirm("確定要將【所有非管理員的會員】設為停權(審核中)嗎？\n這將強制他們(包含舊版本)退回首頁並中斷對資料庫的監聽。", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.role !== 'admin' && u.status === 'approved');
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { status: 'pending' })));
            showMessage(`已成功將 ${targets.length} 名會員轉為審核中`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      const handleApproveAll = () => {
        requestConfirm("確定要將所有【審核中】的會員開通嗎？", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.status === 'pending');
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { status: 'approved' })));
            showMessage(`已成功開通 ${targets.length} 名會員`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      const handleForceLogoutAll = () => {
        requestConfirm("確定要發送強制登出訊號給所有其他會員嗎？\n(注意：此功能僅對已更新至最新版程式碼的用戶有效)", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.id !== appUser.id);
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { forceKicked: true })));
            showMessage(`強制登出訊號已發送給 ${targets.length} 名會員`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      const handleForceRefreshAll = () => {
        requestConfirm("確定要發送「強制重新整理」訊號給所有在線用戶嗎？\n(新版用戶的網頁將會自動重整以獲取最新版本)", async () => {
          setIsReporting(true);
          try {
            const targets = allUsers.filter(u => u.id !== appUser.id);
            await Promise.all(targets.map(u => updateDoc(doc(db, 'users', u.id), { forceRefresh: true })));
            showMessage(`重新整理訊號已發送給 ${targets.length} 名會員`, "success");
          } catch(e) { showMessage("操作失敗", "error"); }
          setIsReporting(false);
        });
      };

      // ==========================================
      // 共用的對話框渲染函式 (覆蓋主畫面與 PiP)
      // ==========================================
      const renderOverlays = (isPip) => (
        <>
          {isSleeping && (
            <div className="fixed inset-0 z-[999] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-500">
              <div className="bg-gray-800 p-8 rounded-3xl border border-gray-700 shadow-2xl flex flex-col items-center max-w-sm text-center animate-in zoom-in-95">
                <div className="w-20 h-20 bg-gray-900 rounded-full flex items-center justify-center mb-6 shadow-inner border border-gray-700">
                   <Moon className="w-10 h-10 text-blue-400 animate-pulse" />
                </div>
                <h2 className="text-2xl font-bold text-white mb-3 tracking-wide">系統已休眠</h2>
                <p className="text-gray-400 mb-8 leading-relaxed text-sm">
                  超過 30 分鐘無操作。<br/>
                  為避免佔用您的電腦效能與系統資源，網頁已自動暫停同步。
                </p>
                <button 
                  onClick={() => setIsSleeping(false)} 
                  className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/50 flex items-center gap-2 hover:scale-105 active:scale-95"
                >
                  <Power className="w-5 h-5" /> 喚醒系統
                </button>
              </div>
            </div>
          )}

          {confirmDialog.isOpen && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/80 animate-in fade-in" onClick={() => !isReporting && setConfirmDialog({isOpen: false, message: '', onConfirm: null})}>
               <div className="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl max-w-sm w-full text-center" onClick={e=>e.stopPropagation()}>
                   <ShieldAlert className="w-12 h-12 text-yellow-500 mx-auto mb-4" />
                   <p className="text-white mb-6 text-base whitespace-pre-wrap leading-relaxed">{confirmDialog.message}</p>
                   <div className="flex justify-center gap-3">
                       <button onClick={() => setConfirmDialog({isOpen: false, message: '', onConfirm: null})} disabled={isReporting} className="px-5 py-2.5 rounded-xl bg-gray-700 hover:bg-gray-600 text-white font-medium flex-1 transition-colors disabled:opacity-50">取消</button>
                       <button 
                         onClick={async () => {
                           setIsReporting(true);
                           try {
                             await confirmDialog.onConfirm();
                           } finally {
                             setIsReporting(false);
                             setConfirmDialog({isOpen: false, message: '', onConfirm: null});
                           }
                         }} 
                         disabled={isReporting}
                         className="px-5 py-2.5 rounded-xl bg-red-600 hover:bg-red-500 text-white font-medium flex-1 transition-colors disabled:opacity-50 flex justify-center items-center gap-2"
                       >
                         {isReporting ? <Activity className="w-4 h-4 animate-spin"/> : null}
                         確定執行
                       </button>
                   </div>
               </div>
            </div>
          )}

          {showPwdModal && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 animate-in fade-in" onClick={() => setShowPwdModal(false)}>
              <div className="bg-gray-800 p-6 rounded-2xl border border-gray-700 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><KeyRound className="w-5 h-5 text-blue-400"/> 修改個人密碼</h3>
                <form onSubmit={handleChangePassword}>
                  <label className="block text-sm text-gray-400 mb-1">新密碼</label>
                  <input type="text" value={newPwd} onChange={e=>setNewPwd(e.target.value)} placeholder="請輸入新密碼" className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-6" required />
                  <div className="flex gap-3">
                    <button type="button" onClick={() => setShowPwdModal(false)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-medium py-2.5 rounded-xl transition-colors">取消</button>
                    <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-xl transition-colors">確認儲存</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {patrolModalData && (() => {
            const active = activeBosses.find(b => b.id === patrolModalData.id) || patrolModalData;
            const history = active.patrolHistory || [];
            return (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 animate-in fade-in" onClick={() => setPatrolModalData(null)}>
                <div className="bg-gray-800 p-6 rounded-2xl border border-purple-500/50 shadow-[0_0_30px_rgba(168,85,247,0.15)] flex flex-col items-center gap-4 w-full max-w-[280px] animate-in zoom-in-95 duration-200" onClick={e=>e.stopPropagation()}>
                   <div className="w-14 h-14 bg-purple-900/40 rounded-full flex items-center justify-center mb-1">
                     <Search className="w-7 h-7 text-purple-400" />
                   </div>
                   <h4 className="font-bold text-white text-xl tracking-wide">{active.channel}頻 巡邏狀態</h4>
                   
                   <div className="w-full bg-gray-900 rounded-xl p-4 text-sm text-gray-300 space-y-2 border border-gray-700">
                      <div className="text-xs text-gray-500 mb-2 border-b border-gray-800 pb-1">最近 3 筆巡邏紀錄</div>
                      {history.length === 0 ? (
                         <div className="text-center py-3 text-gray-500 text-xs">尚未有巡邏紀錄</div>
                      ) : (
                         history.map((record, idx) => (
                           <div key={idx} className="flex justify-between items-center py-1">
                              <span className="font-medium text-gray-300 flex items-center gap-1.5">
                                 <Clock className="w-3.5 h-3.5 text-purple-500/70" />
                                 {new Date(record.time).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false})}
                              </span>
                              <span className="font-medium text-purple-300 max-w-[110px] truncate" title={record.userName}>
                                 {record.userName}
                              </span>
                           </div>
                         ))
                      )}
                   </div>

                   <div className="w-full flex flex-col gap-2 mt-2">
                     <button onClick={() => handleCheckChannel(active)} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl transition-colors font-bold shadow-lg shadow-purple-900/20">
                        在此分流簽到
                     </button>
                     <button onClick={() => setPatrolModalData(null)} className="w-full bg-gray-700 hover:bg-gray-600 text-white py-2.5 rounded-xl transition-colors font-medium">
                        關閉視窗
                     </button>
                   </div>
                </div>
              </div>
            );
          })()}

          {/* 專門為 PiP 視窗渲染的 Alert */}
          {isPip && alertMsg && (
            <div className={`fixed top-4 right-4 z-[999] px-5 py-4 rounded-xl flex items-center gap-4 shadow-2xl animate-in slide-in-from-top-4 border ${
              alertMsg.type === 'success' ? 'bg-green-900/90 border-green-500 text-green-100' : 'bg-red-900/90 border-red-500 text-red-100'
            } bg-gray-900/95`}>
              <span className="flex items-center gap-2 font-medium">
                {alertMsg.type === 'success' ? <CheckCircle className="w-5 h-5 text-green-400"/> : <ShieldAlert className="w-5 h-5 text-red-400"/>} 
                {alertMsg.text}
              </span>
              <button onClick={() => setAlertMsg(null)} className="text-white/60 hover:text-white transition-colors"><X className="w-5 h-5"/></button>
            </div>
          )}
        </>
      );

      return (
        <div className="p-4 md:p-8 font-sans relative">
          
          {/* 在主畫面渲染一次所有提示彈窗 */}
          {renderOverlays(false)}

          {/* === 單王詳細資訊渲染邏輯 (供主視窗與子母畫面共用) === */}
          {(() => {
            const renderBossInnerContent = (group, isPipMode) => {
              const currentNow = Date.now();
              const spawnedCount = group.channels.filter(ch => {
                const diffToNext = ch.nextSpawn - currentNow;
                const diffToMax = (ch.maxSpawn || ch.nextSpawn) - currentNow;
                return diffToNext <= 0 || diffToMax <= 0;
              }).length;

              return (
                <div className={`bg-gray-800 flex flex-col relative overflow-hidden ${isPipMode ? 'w-full h-full' : 'rounded-2xl border border-gray-700 w-full max-w-lg shadow-2xl max-h-[85vh] animate-in zoom-in-95 duration-200'}`} onClick={e => !isPipMode && e.stopPropagation()}>
                  
                  {/* 頭部資訊與 PiP 按鈕 */}
                  <div className="p-4 sm:p-5 border-b border-gray-700 flex items-center justify-between bg-gray-800/80 shrink-0 rounded-t-2xl">
                    <div className="flex items-center gap-4">
                      <div 
                        onClick={() => setShowPipBossSelector(true)}
                        className={`relative flex shrink-0 w-12 h-12 rounded-xl bg-gray-900 items-center justify-center border overflow-hidden cursor-pointer hover:border-blue-500 transition-colors group ${spawnedCount > 0 ? 'border-yellow-500/40' : 'border-gray-700'}`}
                        title="點擊切換其他 BOSS"
                      >
                        {group.imageUrl ? <img src={group.imageUrl} alt={group.name} className="w-full h-full object-cover transition-transform group-hover:scale-110" /> : <Skull className={`w-6 h-6 transition-transform group-hover:scale-110 ${spawnedCount > 0 ? 'text-yellow-400' : 'text-gray-500'}`} />}
                        <div className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                          <RefreshCw className="w-5 h-5 text-white" />
                        </div>
                      </div>
                      <div className="flex flex-col">
                        <div className="flex items-center flex-wrap gap-2">
                          <h3 className="text-lg sm:text-xl font-bold text-white">{group.name}</h3>
                          {group.level && <span className="text-yellow-400 text-sm sm:text-base font-bold">Lv.{group.level}</span>}
                          <span className="text-[11px] sm:text-xs text-gray-400 bg-gray-900 px-2 py-0.5 rounded border border-gray-700 font-medium whitespace-nowrap ml-0.5">
                            CD: {group.minCooldown || group.cooldownMinutes}{group.maxCooldown && group.maxCooldown !== (group.minCooldown || group.cooldownMinutes) ? `~${group.maxCooldown}` : ''}分
                          </span>
                        </div>
                        <div className="text-sm mt-1 flex items-center gap-1.5 sm:gap-2">
                          <span className="text-gray-400">最快重生:</span>
                          <CountdownTimer nextSpawnTime={group.earliestSpawn} maxSpawnTime={group.earliestMaxSpawn} />
                        </div>
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <button onClick={(e) => { e.stopPropagation(); handleTogglePiP(); }} className={`p-2 rounded-full transition-colors shrink-0 ${isPipMode ? 'bg-blue-900/50 hover:bg-gray-700 border border-blue-500/50' : 'bg-gray-900 hover:bg-gray-700'}`} title={isPipMode ? "關閉子母畫面" : "以置頂子母畫面彈出"}>
                        <PictureInPicture className={`w-5 h-5 ${isPipMode ? 'text-blue-400' : 'text-blue-400'}`} />
                      </button>
                      {!isPipMode && (
                        <button onClick={() => setActiveModalBossId(null)} className="p-2 bg-gray-900 hover:bg-gray-700 rounded-full transition-colors shrink-0">
                          <X className="w-5 h-5 text-gray-400" />
                        </button>
                      )}
                    </div>
                  </div>

                  {/* 快速新增表單 */}
                  <div className="px-4 py-3 sm:px-5 sm:py-4 bg-gray-800/95 backdrop-blur-sm border-b border-gray-700 shrink-0 z-10 shadow-lg">
                    <form onSubmit={(e) => { e.preventDefault(); handleModalQuickAdd(group); }} className="flex flex-col gap-2 bg-gray-900/80 p-2 sm:p-3 rounded-xl border border-gray-700/80 shadow-inner">
                      <div className="flex flex-wrap gap-2">
                        <div className="flex flex-1 gap-2 min-w-[200px]">
                          <div className="w-[110px] sm:w-[130px] shrink-0 relative">
                            <MapPin className="w-4 h-4 text-gray-500 absolute left-2.5 top-1/2 -translate-y-1/2" />
                            <input type="number" min="1" value={modalChannelInput} onChange={e => setModalChannelInput(e.target.value)} placeholder="分流" className="w-full bg-gray-800 border border-gray-600 rounded-lg pl-8 pr-2 py-2 text-white text-sm focus:outline-none focus:border-blue-500 text-center" required />
                          </div>
                          <div className="flex-1">
                            <input type="text" value={modalMemoInput} onChange={e => setModalMemoInput(e.target.value)} placeholder="備註 (選填, 例: 掉寶)" className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" />
                          </div>
                        </div>

                        <div className="flex w-full sm:w-auto items-center gap-1.5 shrink-0 justify-end">
                          <select value={modalKillDateSelect} onChange={e=>setModalKillDateSelect(e.target.value)} className="w-[65px] bg-gray-800 border border-gray-600 rounded-lg px-1 py-2 text-white text-sm focus:outline-none focus:border-blue-500 text-center">
                            <option value="today">今天</option>
                            <option value="yesterday">昨天</option>
                          </select>
                          <input type="time" step="1" value={modalKillTimeInput} onChange={e => setModalKillTimeInput(e.target.value)} className="w-[105px] bg-gray-800 border border-gray-600 rounded-lg px-2 py-2 text-white text-sm focus:outline-none focus:border-blue-500 [color-scheme:dark]" title="擊殺時間 (空白為現在)" />
                          <button type="submit" disabled={isReporting || !modalChannelInput.trim()} className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-lg text-sm transition-colors disabled:opacity-50 h-[38px] min-w-[70px]">
                            登記
                          </button>
                        </div>
                      </div>
                    </form>
                  </div>

                  <div className="p-4 sm:p-5 overflow-y-auto flex flex-col gap-3 relative z-0 flex-1 pb-6">
                    <div className="flex flex-wrap items-center justify-between gap-3 shrink-0 mb-1">
                      <div className="flex flex-wrap items-center gap-4 bg-gray-900/40 p-2.5 rounded-xl border border-gray-700/50">
                        <div className="flex items-center gap-2 text-xs text-red-400 font-medium">
                          <div className="w-2.5 h-2.5 rounded-[3px] bg-red-900/80 border border-red-500/50"></div>
                          準備重生了
                        </div>
                        <div className="flex items-center gap-2 text-xs text-yellow-400 font-medium">
                          <div className="w-2.5 h-2.5 rounded-[3px] bg-yellow-900/80 border border-yellow-500/50"></div>
                          可能重生頻道
                        </div>
                        <div className="flex items-center gap-2 text-xs text-purple-400 font-medium">
                          <div className="w-2.5 h-2.5 rounded-[3px] bg-purple-900/80 border border-purple-500/50"></div>
                          再次擊殺頻道
                        </div>
                        <div className="flex items-center gap-1.5 text-xs text-cyan-400 font-medium ml-1">
                          ⌛ 個人巡邏 (不耗讀取)
                        </div>
                      </div>
                      
                      {(canDeleteStale || canDeleteAll) && group.channels.length > 0 && (
                        <div className="flex items-center gap-1.5 flex-wrap justify-end w-full sm:w-auto mt-2 sm:mt-0">
                          {canDeleteAll && (
                             <button onClick={() => handleClearAllRecords(group)} disabled={isReporting} className="flex items-center gap-1.5 px-3 py-2 bg-gray-800 hover:bg-red-900/60 text-gray-400 hover:text-red-400 border border-gray-700 hover:border-red-500/80 rounded-xl text-xs font-bold transition-all disabled:opacity-50 whitespace-nowrap">
                               <Trash2 className="w-3.5 h-3.5" /> 清空此王
                             </button>
                          )}
                          {canDeleteStale && (
                            isAdmin ? (
                              <>
                                <select 
                                   value={staleClearHours} 
                                   onChange={(e)=>setStaleClearHours(Number(e.target.value))}
                                   className="bg-gray-800 border border-gray-700 text-gray-300 text-xs rounded-lg px-2 py-2 outline-none focus:border-red-500/50"
                                >
                                   <option value={1}>1小時+</option>
                                   <option value={2}>2小時+</option>
                                   <option value={3}>3小時+</option>
                                   <option value={4}>4小時+</option>
                                   <option value={8}>8小時+</option>
                                   <option value={12}>12小時+</option>
                                </select>
                                <button onClick={() => handleClearStaleRecords(group, staleClearHours)} disabled={isReporting} className="flex items-center gap-1.5 px-3 py-2 bg-gray-800 hover:bg-red-900/40 text-gray-400 hover:text-red-400 border border-gray-700 hover:border-red-500/50 rounded-xl text-xs font-bold transition-all disabled:opacity-50 whitespace-nowrap">
                                  <Trash2 className="w-3.5 h-3.5" /> 清除過期
                                </button>
                              </>
                            ) : (
                              <button onClick={() => handleClearStaleRecords(group, 4)} disabled={isReporting} className="flex items-center gap-1.5 px-3 py-2 bg-gray-800 hover:bg-red-900/40 text-gray-400 hover:text-red-400 border border-gray-700 hover:border-red-500/50 rounded-xl text-xs font-bold transition-all disabled:opacity-50 whitespace-nowrap">
                                <Trash2 className="w-3.5 h-3.5" /> 清除過期 (4hr+)
                              </button>
                            )
                          )}
                        </div>
                      )}
                    </div>

                    {group.effectiveGlobalSpawn !== null && (
                      <div className={`flex items-center justify-between p-2 sm:p-2.5 rounded-lg border relative overflow-hidden shrink-0 bg-purple-900/20 border-purple-500/40`}>
                        <div className="flex items-center gap-2.5 relative z-10">
                          <div className={`flex flex-col items-center justify-center border rounded px-2 py-1 min-w-[3.5rem] bg-purple-900/50 border-purple-500/50`}>
                            <Server className={`w-3.5 h-3.5 mb-0.5 text-purple-400`} />
                            <span className={`font-bold text-[10px] sm:text-[11px] leading-tight text-purple-300`}>全伺服器</span>
                          </div>
                          <div className="text-[11px] sm:text-xs text-gray-400 flex flex-col">
                            <span className="text-gray-300 tracking-wide">系統維修 / 全域計時</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-2 relative z-10 mr-1">
                          <span className="text-[11px] sm:text-sm">
                             <CountdownTimer nextSpawnTime={group.effectiveGlobalSpawn} maxSpawnTime={group.effectiveGlobalMaxSpawn} />
                          </span>
                        </div>
                      </div>
                    )}

                    {group.channels.length === 0 && group.effectiveGlobalSpawn === null && (
                      <p className="text-gray-500 text-center py-4 text-sm">目前沒有任何分流紀錄</p>
                    )}
                    {group.channels.length > 0 && (() => {
                      const sortedChannels = [...group.channels].sort((a, b) => a.nextSpawn - b.nextSpawn);
                      const itemsPerPage = 10;
                      const totalPages = Math.max(1, Math.ceil(sortedChannels.length / itemsPerPage));
                      const safePage = Math.min(modalPage, totalPages);
                      const paginatedChannels = sortedChannels.slice((safePage - 1) * itemsPerPage, safePage * itemsPerPage);

                      return (
                        <div className="flex flex-col gap-1">
                          {paginatedChannels.map(active => {
                            const diffToNext = active.nextSpawn - currentNow;
                            const diffToMax = (active.maxSpawn || active.nextSpawn) - currentNow;
                            const isWarning = diffToNext <= 10 * 60 * 1000 && diffToNext > 0;
                            const isFloating = diffToNext <= 0 && diffToMax > 0; 
                            const isSpawned = diffToMax <= 0; 
                            
                            const isRekilled = active.isRekilled === true; 
                            const canDelete = isAdmin || active.reportedBy === appUser.id;
                            const isExpanded = expandedMemoId === active.id;
                            
                            const showActionButtons = (isFloating || isSpawned);

                            return (
                              <div key={active.id} className={`flex flex-col rounded-lg border relative transition-all duration-300 overflow-hidden shrink-0 ${isSpawned ? 'bg-green-500/10 border-green-500/30' : isFloating ? 'bg-yellow-500/10 border-yellow-500/40 shadow-[0_0_15px_rgba(234,179,8,0.15)]' : isWarning ? 'bg-red-900/30 border-red-500/60 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : isRekilled ? 'bg-purple-900/20 border-purple-500/40 shadow-[0_0_15px_rgba(168,85,247,0.1)]' : 'bg-gray-800 border-gray-700'}`}>
                                {isWarning && <div className="absolute inset-0 bg-red-500/5 animate-pulse pointer-events-none"></div>}
                                
                                <div className="flex items-center justify-between p-1 sm:p-1.5 relative z-10 w-full">
                                  <div className="flex items-center gap-2 sm:gap-3 flex-1 min-w-0">
                                    <div 
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        if (active.memo) setExpandedMemoId(isExpanded ? null : active.id);
                                      }}
                                      className={`relative flex items-center justify-center border rounded px-2 sm:px-3 py-0.5 sm:py-1 min-w-[3rem] sm:min-w-[4rem] shrink-0 transition-colors ${active.memo ? 'cursor-pointer hover:brightness-125' : ''} ${isSpawned ? 'bg-green-900/50 border-green-500/50' : isFloating ? 'bg-yellow-900/50 border-yellow-500/50' : isWarning ? 'bg-red-900/50 border-red-500/50' : isRekilled ? 'bg-purple-900/50 border-purple-500/50' : 'bg-gray-900 border-gray-600'}`}
                                      title={active.memo ? "點擊顯示備註" : ""}
                                    >
                                      <div className={`font-bold leading-none flex items-baseline justify-center ${isSpawned ? 'text-green-400' : isFloating ? 'text-yellow-400' : isWarning ? 'text-red-400' : isRekilled ? 'text-purple-400' : 'text-blue-400'}`}>
                                        <span className="text-[13px] sm:text-[15px]">{active.channel}</span>
                                      </div>
                                      {active.memo && (
                                        <div className="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold w-3 h-3 flex items-center justify-center rounded-full shadow-[0_0_5px_rgba(239,68,68,0.8)] border border-gray-800">
                                          !
                                        </div>
                                      )}
                                    </div>
                                    <div className="text-[10px] sm:text-[11px] text-gray-400 flex items-center gap-1 min-w-0">
                                      <span className="flex items-center gap-1 text-gray-300 whitespace-nowrap">
                                        <History className="w-3 h-3 shrink-0"/> 
                                        {new Date(active.lastKilled).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false })}
                                        <span className="text-blue-300/80 ml-1 font-medium inline-block max-w-[50px] sm:max-w-none truncate align-bottom" title={active.reporterName}>({active.reporterName || '未知'})</span>
                                      </span>
                                    </div>
                                  </div>
                                  
                                  <div className="flex items-center justify-end gap-1 sm:gap-1.5 relative z-10 shrink-0 ml-1">
                                    {isWarning && <Flame className="w-3 h-3 sm:w-3.5 sm:h-3.5 text-red-500 animate-bounce mr-1" />}
                                    
                                    <span className={`text-[11px] sm:text-xs mr-1 ${isWarning ? 'text-red-400 font-bold' : isRekilled && !isFloating && !isSpawned && !isWarning ? 'text-purple-300' : 'text-gray-300'}`}>
                                       <CountdownTimer nextSpawnTime={active.nextSpawn} maxSpawnTime={active.maxSpawn} />
                                    </span>
                                    
                                    <div className="flex items-center gap-1">
                                        {isFloating && (
                                          <button 
                                            onClick={(e) => { 
                                              e.stopPropagation(); 
                                              if (isLongPress.current) {
                                                isLongPress.current = false;
                                                return;
                                              }
                                              handleLocalPatrol(active.id); 
                                            }} 
                                            onTouchStart={() => {
                                              isLongPress.current = false;
                                              if (localPatrols[active.id]) {
                                                longPressTimer.current = setTimeout(() => {
                                                  isLongPress.current = true;
                                                  const timeStr = new Date(localPatrols[active.id]).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
                                                  showMessage(`⌛ 您上次標記巡邏的時間為 ${timeStr}`, 'success');
                                                }, 500);
                                              }
                                            }}
                                            onTouchEnd={() => { if (longPressTimer.current) clearTimeout(longPressTimer.current); }}
                                            onTouchMove={() => { if (longPressTimer.current) clearTimeout(longPressTimer.current); }}
                                            onMouseDown={() => {
                                              isLongPress.current = false;
                                              if (localPatrols[active.id]) {
                                                longPressTimer.current = setTimeout(() => {
                                                  isLongPress.current = true;
                                                  const timeStr = new Date(localPatrols[active.id]).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
                                                  showMessage(`⌛ 您上次標記巡邏的時間為 ${timeStr}`, 'success');
                                                }, 500);
                                              }
                                            }}
                                            onMouseUp={() => { if (longPressTimer.current) clearTimeout(longPressTimer.current); }}
                                            onMouseLeave={() => { if (longPressTimer.current) clearTimeout(longPressTimer.current); }}
                                            onContextMenu={(e) => e.preventDefault()}
                                            style={{ WebkitTouchCallout: 'none' }}
                                            className={`w-6 h-6 sm:w-7 sm:h-7 rounded text-[10px] sm:text-xs transition-colors flex items-center justify-center shrink-0 border select-none touch-manipulation ${localPatrols[active.id] ? 'bg-cyan-600/20 text-cyan-400 border-cyan-500/30' : 'bg-gray-700/50 text-gray-400 border-gray-600/50 hover:bg-gray-600'}`} 
                                            title={localPatrols[active.id] ? `您於 ${new Date(localPatrols[active.id]).toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false})} 標記檢查` : "標記個人巡邏 (無讀取消耗, 僅自己可見)"}
                                          >
                                            <span>⌛</span>
                                          </button>
                                        )}

                                        {showActionButtons && (
                                          <>
                                            <button onClick={(e) => { e.stopPropagation(); handleQuickReportKill(active); }} className="w-6 h-6 sm:w-7 sm:h-7 bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 border border-blue-500/30 rounded text-xs transition-colors flex items-center justify-center shrink-0" title="再次擊殺">⚔️</button>
                                            
                                            {isSpawned ? (
                                              <button onClick={(e) => { e.stopPropagation(); handleDeleteActiveBoss(active.id, true); }} className="h-6 sm:h-7 px-1.5 sm:px-2 bg-gray-700/50 text-gray-400 hover:bg-gray-600 border border-gray-600/50 rounded text-[11px] sm:text-xs font-bold transition-colors flex items-center justify-center whitespace-nowrap shrink-0">無王</button>
                                            ) : group.enablePatrol ? (
                                              <button 
                                                onClick={(e) => { e.stopPropagation(); setPatrolModalData(active); }} 
                                                className="w-6 h-6 sm:w-7 sm:h-7 bg-purple-600/20 text-purple-400 hover:bg-purple-600/30 border border-purple-500/30 rounded transition-colors flex items-center justify-center relative shrink-0" 
                                                title={active.patrolHistory && active.patrolHistory.length > 0 ? "開啟巡邏視窗 (已有巡邏紀錄)" : "開啟巡邏視窗"}
                                              >
                                                <Search className="w-3 h-3 sm:w-3.5 sm:h-3.5" />
                                                {active.patrolHistory && active.patrolHistory.length > 0 && (
                                                  <span className="absolute -top-0.5 -right-0.5 flex h-1.5 w-1.5">
                                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-purple-400 opacity-75"></span>
                                                    <span className="relative inline-flex rounded-full h-1.5 w-1.5 bg-purple-400"></span>
                                                  </span>
                                                )}
                                              </button>
                                            ) : null}
                                          </>
                                        )}
                                    </div>

                                    {canDelete && !isSpawned && (
                                      <button onClick={(e) => { e.stopPropagation(); handleDeleteActiveBoss(active.id, false); }} className={`w-6 h-6 sm:w-7 sm:h-7 rounded transition-colors border border-transparent flex items-center justify-center shrink-0 ml-0.5 ${isWarning ? 'text-red-300 hover:bg-red-500/20' : 'text-gray-500 hover:text-red-400 hover:bg-red-500/10 hover:border-red-500/20'}`} title={isAdmin ? "管理員刪除此紀錄" : "刪除您的紀錄"}>
                                        <Trash2 className="w-3 h-3 sm:w-3.5 sm:h-3.5" />
                                      </button>
                                    )}
                                  </div>
                                </div>
                                
                                {isExpanded && active.memo && (
                                  <div className="bg-gray-900/50 border-t border-gray-700/50 p-1 sm:p-1.5 text-[11px] sm:text-xs text-gray-300 animate-in slide-in-from-top-1 px-2 sm:px-3">
                                    <span className="text-gray-500 font-bold mr-1.5 select-none">備註:</span>
                                    <span className="break-all">{active.memo}</span>
                                  </div>
                                )}
                              </div>
                            );
                          })}
                          
                          {totalPages > 1 && (
                            <div className="flex justify-between items-center pt-2 mt-1 border-t border-gray-700/50 shrink-0 gap-1 sm:gap-2">
                              <div className="flex gap-1">
                                <button onClick={() => setModalPage(1)} disabled={safePage === 1} className="px-2 sm:px-3 py-1.5 bg-gray-700 hover:bg-gray-600 disabled:opacity-30 rounded text-xs transition-colors text-white font-medium">首頁</button>
                                <button onClick={() => setModalPage(p => Math.max(1, p - 1))} disabled={safePage === 1} className="px-2 sm:px-3 py-1.5 bg-gray-700 hover:bg-gray-600 disabled:opacity-30 rounded text-xs transition-colors text-white font-medium">上一頁</button>
                              </div>
                              <span className="text-gray-400 text-xs font-medium whitespace-nowrap">第 {safePage} / {totalPages} 頁</span>
                              <div className="flex gap-1">
                                <button onClick={() => setModalPage(p => Math.min(totalPages, p + 1))} disabled={safePage === totalPages} className="px-2 sm:px-3 py-1.5 bg-gray-700 hover:bg-gray-600 disabled:opacity-30 rounded text-xs transition-colors text-white font-medium">下一頁</button>
                                <button onClick={() => setModalPage(totalPages)} disabled={safePage === totalPages} className="px-2 sm:px-3 py-1.5 bg-gray-700 hover:bg-gray-600 disabled:opacity-30 rounded text-xs transition-colors text-white font-medium">末頁</button>
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })()}
                  </div>

                  {/* 切換王選單 Overlay */}
                  {showPipBossSelector && (
                    <div className="absolute inset-0 z-[200] bg-gray-900 flex flex-col animate-in fade-in zoom-in-95 duration-200">
                      <div className="p-4 border-b border-gray-700 flex flex-col gap-3 bg-gray-800 shrink-0">
                        <div className="flex justify-between items-center">
                          <h3 className="font-bold text-white flex items-center gap-2"><RefreshCw className="w-4 h-4"/> 切換追蹤 BOSS</h3>
                          <button onClick={(e) => { e.stopPropagation(); setShowPipBossSelector(false); setPipSearchQuery(''); }} className="p-1.5 bg-gray-700 hover:bg-gray-600 rounded-full transition-colors"><X className="w-5 h-5 text-gray-300"/></button>
                        </div>
                        
                        {/* 獨立的搜尋與排序區塊 */}
                        <div className="flex items-center gap-2">
                          <div className="relative flex-1">
                            <Search className="w-3.5 h-3.5 text-gray-500 absolute left-2.5 top-1/2 -translate-y-1/2" />
                            <input 
                               type="text" 
                               value={pipSearchQuery} 
                               onChange={(e) => setPipSearchQuery(e.target.value)} 
                               placeholder="搜尋王..." 
                               className="w-full bg-gray-900 border border-gray-700 rounded-lg pl-8 pr-2 py-1.5 text-white text-xs focus:outline-none focus:border-blue-500" 
                            />
                          </div>
                          <select 
                             value={pipBossSort} 
                             onChange={e=>setPipBossSort(e.target.value)} 
                             className="w-[110px] bg-gray-900 border border-gray-700 rounded-lg px-2 py-1.5 text-xs text-white focus:outline-none focus:border-blue-500 shrink-0"
                          >
                            <option value="earliest">重生時間排序</option>
                            <option value="levelAsc">等級低到高</option>
                            <option value="levelDesc">等級高到低</option>
                            <option value="hasRecordOnly">有紀錄Boss</option>
                          </select>
                        </div>
                      </div>
                      <div className="flex-1 overflow-y-auto p-3 space-y-2 pb-6">
                        {displayBosses.pip.length === 0 ? (
                           <div className="text-center py-6 text-gray-500 text-sm">找不到符合條件的王</div>
                        ) : (
                           displayBosses.pip.map(b => {
                             const bSpawnedCount = b.channels.filter(ch => (ch.nextSpawn - Date.now()) <= 0).length;
                             return (
                               <div key={b.id} onClick={(e) => { e.stopPropagation(); setActiveModalBossId(b.id); setShowPipBossSelector(false); setPipSearchQuery(''); }} className={`flex items-center justify-between p-3 rounded-xl border transition-colors cursor-pointer ${b.id === group.id ? 'bg-blue-900/30 border-blue-500/50' : 'bg-gray-800 border-gray-700 hover:border-gray-500'}`}>
                                  <div className="flex items-center gap-3">
                                     <div className={`w-10 h-10 rounded-lg overflow-hidden bg-gray-900 border flex items-center justify-center shrink-0 ${bSpawnedCount > 0 ? 'border-yellow-500/50' : 'border-gray-600'}`}>
                                        {b.imageUrl ? <img src={b.imageUrl} className="w-full h-full object-cover" /> : <Skull className="w-5 h-5 text-gray-500"/>}
                                     </div>
                                     <div className="flex flex-col">
                                        <span className="font-bold text-gray-200 text-sm">{b.name} {b.level && <span className="text-yellow-400 text-xs ml-1">Lv.{b.level}</span>}</span>
                                        <div className="text-xs text-gray-400 mt-0.5 flex items-center gap-1">
                                           最快重生: <CountdownTimer nextSpawnTime={b.earliestSpawn} maxSpawnTime={b.earliestMaxSpawn} />
                                        </div>
                                     </div>
                                  </div>
                                  {b.id === group.id && <CheckCircle className="w-5 h-5 text-blue-400" />}
                               </div>
                             );
                           })
                        )}
                      </div>
                    </div>
                  )}

                </div>
              );
            };

            const activeGroup = displayBosses.main.find(g => g.id === activeModalBossId);

            return (
              <>
                {/* 1. 若啟用子母畫面，且有選擇王，則透過 createPortal 渲染到獨立視窗 */}
                {pipWindow && pipContainer && createPortal(
                  <>
                    {activeGroup ? (
                      renderBossInnerContent(activeGroup, true)
                    ) : (
                      <div className="flex flex-col items-center justify-center h-full flex-1 bg-gray-900 text-gray-500">
                        <PictureInPicture className="w-12 h-12 mb-4 opacity-50" />
                        <p className="font-medium">請在主網頁點選要追蹤的王</p>
                        <p className="text-xs mt-2 opacity-70">畫面會自動在此同步顯示</p>
                      </div>
                    )}
                    {/* 在子母畫面內部同時渲染一次所有提示彈窗，這樣在子母畫面點擊時就能直接看到 */}
                    {renderOverlays(true)}
                  </>,
                  pipContainer
                )}

                {/* 2. 若未啟用子母畫面，則維持在主畫面渲染置中彈窗 */}
                {!pipWindow && activeGroup && (
                  <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 animate-in fade-in" onClick={() => setActiveModalBossId(null)}>
                    {renderBossInnerContent(activeGroup, false)}
                  </div>
                )}
              </>
            );
          })()}

          <div className="max-w-6xl mx-auto space-y-6">
            
            <header className="flex flex-col md:flex-row md:items-center justify-between bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 gap-4">
              <div className="flex items-center gap-4">
                <div className="w-14 h-14 bg-gray-900 rounded-xl flex items-center justify-center border border-gray-700 overflow-hidden shadow-lg shrink-0">
                  <img src="./logo2.png" alt="Logo" className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
                </div>
                <div>
                  <h1 className="text-2xl font-bold text-white tracking-wide">Waku野王重生計時</h1>
                  <p className="text-gray-400 text-sm mt-1">目前身份：<span className={isAdmin ? 'text-purple-400 font-bold' : 'text-green-400 font-bold'}>{isAdmin ? '管理員' : '一般會員'}</span></p>
                </div>
              </div>
              <div className="flex items-center gap-3 border-t md:border-t-0 border-gray-700 pt-4 md:pt-0">
                <span className="text-gray-300 text-sm">歡迎, <span className="font-bold text-white text-base">{appUser.username}</span></span>
                <button onClick={() => setShowPwdModal(true)} className="ml-2 bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1"><KeyRound className="w-4 h-4"/> 密碼</button>
                <button onClick={onLogout} className="bg-red-600/20 hover:bg-red-600/40 text-red-400 border border-red-500/30 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1"><LogOut className="w-4 h-4"/> 登出</button>
              </div>
            </header>

            {isAdmin && (
              <section className="bg-gray-800 p-6 rounded-2xl shadow-lg border border-purple-500/30 ring-1 ring-purple-500/20 animate-in fade-in duration-300">
                <div className="flex items-center gap-2 mb-6 border-b border-gray-700 pb-4 overflow-x-auto">
                  <button onClick={() => setAdminTab('home')} className={`px-4 py-2 rounded-lg text-sm font-bold flex shrink-0 items-center gap-2 transition-colors ${adminTab === 'home' ? 'bg-purple-600 text-white' : 'bg-gray-900 text-gray-400 hover:bg-gray-700'}`}>
                    <MapPin className="w-4 h-4"/> 擊殺登記 / 狀態
                  </button>
                  <button onClick={() => setAdminTab('boss')} className={`px-4 py-2 rounded-lg text-sm font-bold flex shrink-0 items-center gap-2 transition-colors ${adminTab === 'boss' ? 'bg-purple-600 text-white' : 'bg-gray-900 text-gray-400 hover:bg-gray-700'}`}>
                    <Crosshair className="w-4 h-4"/> BOSS 管理
                  </button>
                  <button onClick={() => setAdminTab('users')} className={`px-4 py-2 rounded-lg text-sm font-bold flex shrink-0 items-center gap-2 transition-colors ${adminTab === 'users' ? 'bg-purple-600 text-white' : 'bg-gray-900 text-gray-400 hover:bg-gray-700 relative'}`}>
                    <Users className="w-4 h-4"/> 會員管理
                    {allUsers.filter(u => u.status === 'pending').length > 0 && (
                      <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-gray-800"></span>
                    )}
                  </button>
                  <button onClick={() => setAdminTab('system')} className={`px-4 py-2 rounded-lg text-sm font-bold flex shrink-0 items-center gap-2 transition-colors ${adminTab === 'system' ? 'bg-purple-600 text-white' : 'bg-gray-900 text-gray-400 hover:bg-gray-700'}`}>
                    <Settings className="w-4 h-4"/> 系統控制
                  </button>
                </div>

                {adminTab === 'boss' ? (
                  <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div className="flex flex-col xl:flex-row xl:items-center justify-between mb-6 gap-4">
                      <div className="flex items-center gap-2 cursor-pointer hover:bg-gray-700/50 p-2 -ml-2 rounded-lg transition-colors select-none" onClick={() => setShowBossForm(!showBossForm)}>
                        <h2 className="text-lg font-semibold flex items-center gap-2 text-purple-400">
                          <UserCog className="w-5 h-5" />
                          {editingTemplateId ? '編輯 BOSS 種類' : '設定 BOSS 種類與外觀'}
                        </h2>
                        {showBossForm ? <ChevronUp className="w-5 h-5 text-purple-400" /> : <ChevronDown className="w-5 h-5 text-purple-400" />}
                      </div>
                      
                      <div className="flex flex-col sm:flex-row items-end sm:items-center gap-3">
                        <div className="flex flex-col items-end">
                           <label className="text-[11px] text-gray-400 mb-0.5">自訂基準時間 (維修重置用，留空為現在)</label>

                        <span className="text-yellow-400 font-medium">注意：若是「舊版客戶端」的用戶沒有實裝最新的強制登出功能，唯一能踢除他們的辦法是「一鍵全體停權」，這會讓他們退回審核畫面並立即中斷資料庫監聽。</span>
                      </p>

                           <button onClick={handleForceLogoutAll} disabled={isReporting} className="mt-2 w-full bg-purple-600/20 hover:bg-purple-600/40 text-purple-400 border border-purple-500/30 px-3 py-2.5 rounded-lg text-sm font-bold transition-colors flex items-center justify-center gap-2"><Power className="w-4 h-4"/> 發送強制登出訊號</button>

                      </div>
                    </div>

                            </select>
                          </div>
                          
                          <div className="w-[80px] shrink-0">
                            <label className="block text-sm text-gray-400 mb-1">分流</label>

                          </div>
                          
                          <div className="flex-1 min-w-[120px] max-w-full sm:max-w-[200px] shrink-0">
                            <label className="block text-sm text-gray-400 mb-1">備註 (選填)</label>

                          <div className="w-full sm:w-auto shrink-0 flex gap-1">

                            </button>
                          </div>
                        </form>

                    <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                      <h2 className="text-xl font-bold text-gray-200 flex items-center gap-2">
                        <Clock className="w-6 h-6 text-yellow-500" />
                        各頻道 BOSS 狀態
                      </h2>
                      <div className="flex items-center gap-3 text-[11px] font-medium text-gray-400 bg-gray-800 border border-gray-700 rounded-lg px-2.5 py-1 flex-wrap">
                        <span className="flex items-center gap-1 text-red-400"><div className="w-2 h-2 rounded bg-red-500/80"></div> 準備重生了</span>
                        <span className="flex items-center gap-1 text-yellow-400"><div className="w-2 h-2 rounded bg-yellow-500/80"></div> 可能重生頻道</span>
                        <span className="flex items-center gap-1 text-purple-400"><div className="w-2 h-2 rounded bg-purple-500/80"></div> 再次擊殺頻道</span>
                      </div>
                    </div>
                    <select value={bossSort} onChange={e=>setBossSort(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-full sm:w-auto">
                      <option value="levelAsc">等級低到高</option>
                      <option value="levelDesc">等級高到低</option>
                      <option value="earliest">CD時間排序</option>
                      <option value="hasRecordOnly">顯示有紀錄Boss</option>
                    </select>
                  </div>

                  {displayBosses.main.length === 0 ? (
                    <div className="text-center py-16 bg-gray-800 rounded-2xl border border-gray-700 border-dashed">
                      <Skull className="w-12 h-12 text-gray-600 mx-auto mb-3" />
                      <p className="text-gray-400">目前沒有符合條件的重生資訊。</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                      {displayBosses.main.map(group => {
                        const isPinned = pinnedBosses.includes(group.id);
                        
                        const currentNow = Date.now();
                        // 統計進入浮動(黃)或已重生(綠)的頻道總數
                        const spawnedChannels = group.channels.filter(ch => {
                          const diffToNext = ch.nextSpawn - currentNow;
                          return diffToNext <= 0; // 只要最快重生時間過了，就算是準備重生或已重生
                        });
                        
                        const spawnedCount = spawnedChannels.length;

                        return (
                          <div key={group.id} onClick={() => setActiveModalBossId(group.id)} className={`bg-gray-800 rounded-2xl border transition-all duration-300 overflow-hidden cursor-pointer hover:scale-[1.01] active:scale-[0.99] relative ${spawnedCount > 0 ? 'border-yellow-500/40 shadow-[0_0_10px_rgba(234,179,8,0.1)]' : 'border-gray-700 hover:border-gray-500'} ${isPinned ? 'ring-1 ring-yellow-500/30 bg-gray-800/90' : ''}`}>
                            
                            <button onClick={(e) => togglePin(e, group.id)} className="absolute top-2 right-2 p-1.5 rounded-full bg-gray-900/50 hover:bg-gray-700 transition-colors z-20 group" title={isPinned ? "取消釘選" : "釘選置頂"}>
                               <Star className={`w-4 h-4 transition-all ${isPinned ? 'fill-yellow-500 text-yellow-500' : 'text-gray-500 group-hover:text-yellow-400'}`} />
                            </button>

                            <div className="p-4 sm:p-5 flex items-center justify-between select-none bg-gray-800 hover:bg-gray-750 transition-colors">
                              <div className="flex items-center gap-4">
                                <div className={`flex shrink-0 w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gray-900 items-center justify-center border overflow-hidden ${spawnedCount > 0 ? 'border-yellow-500/40' : 'border-gray-700'}`}>
                                  {group.imageUrl ? <img src={group.imageUrl} alt={group.name} className="w-full h-full object-cover" /> : <Skull className={`w-6 h-6 ${spawnedCount > 0 ? 'text-yellow-400' : 'text-gray-500'}`} />}
                                </div>
                                <div>
                                  <h3 className="text-lg sm:text-xl font-bold text-white flex items-center flex-wrap gap-2 pr-6">
                                    {group.name} {group.level && <span className="text-yellow-400 text-sm sm:text-base">Lv.{group.level}</span>}
                                    {group.channels.length > 0 && <span className="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/30">{group.channels.length} 分流</span>}
                                    {spawnedCount > 0 && <span className="text-[11px] font-bold bg-yellow-500 text-gray-900 px-2 py-0.5 rounded-full shadow-[0_0_8px_rgba(234,179,8,0.6)] animate-pulse">{spawnedCount} 可確認</span>}
                                  </h3>
                                  <div className="text-sm mt-1 flex items-center gap-1.5 sm:gap-2">
                                    <span className="text-gray-400 hidden sm:inline">最快重生:</span>
                                    <CountdownTimer nextSpawnTime={group.earliestSpawn} maxSpawnTime={group.earliestMaxSpawn} />
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </section>
              </>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [appUser, setAppUser] = useState(null);
      const [isCheckingAuth, setIsCheckingAuth] = useState(true);
      const [alertMsg, setAlertMsg] = useState(null); 

      const showMessage = (text, type = 'error') => {
        setAlertMsg({ text, type });
        setTimeout(() => setAlertMsg(null), 5000);
      };

      useEffect(() => {
        const storedUserId = localStorage.getItem('wakuboss_user_id');
        if (!storedUserId) {
          setIsCheckingAuth(false);
          return;
        }
        
        const unsub = onSnapshot(doc(db, 'users', storedUserId), (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            
            if (data.forceRefresh) {
               updateDoc(doc(db, 'users', storedUserId), { forceRefresh: false })
                 .then(() => window.location.reload())
                 .catch(() => window.location.reload());
            } 
            else if (data.forceKicked) {
               localStorage.removeItem('wakuboss_user_id');
               setAppUser(null);
               updateDoc(doc(db, 'users', storedUserId), { forceKicked: false }).catch(()=>{});
               showMessage('管理員已強制將您登出 / 系統維護中', 'error');
            } else {
               setAppUser({ id: docSnap.id, ...data });
            }
          } else {
            setAppUser(null);
            localStorage.removeItem('wakuboss_user_id');
          }
          setIsCheckingAuth(false);
        }, (error) => {
          console.warn("Auth 監聽暫時中斷或網路異常:", error);
        });

        return () => unsub();
      }, []);

      const handleLogout = () => {
        localStorage.removeItem('wakuboss_user_id');
        setAppUser(null);
        showMessage('已成功登出', 'success');
      };

      return (
        <>
          {alertMsg && (
            <div className={`fixed top-4 right-4 z-[99] px-5 py-4 rounded-xl flex items-center gap-4 shadow-2xl animate-in slide-in-from-top-4 border ${
              alertMsg.type === 'success' ? 'bg-green-900/90 border-green-500 text-green-100' : 'bg-red-900/90 border-red-500 text-red-100'
            } bg-gray-900/95`}>
              <span className="flex items-center gap-2 font-medium">
                {alertMsg.type === 'success' ? <CheckCircle className="w-5 h-5 text-green-400"/> : <ShieldAlert className="w-5 h-5 text-red-400"/>} 
                {alertMsg.text}
              </span>
              <button onClick={() => setAlertMsg(null)} className="text-white/60 hover:text-white transition-colors"><X className="w-5 h-5"/></button>
            </div>
          )}

          {isCheckingAuth ? (
            <div className="min-h-screen flex items-center justify-center">
              <Activity className="w-12 h-12 text-blue-500 animate-spin" />
            </div>
          ) : !appUser ? (
            <AuthScreen setAppUser={setAppUser} showMessage={showMessage} />
          ) : appUser.status === 'pending' ? (
            <PendingScreen onLogout={handleLogout} />
          ) : (
            <MainApp appUser={appUser} onLogout={handleLogout} showMessage={showMessage} alertMsg={alertMsg} setAlertMsg={setAlertMsg} />
          )}
        </>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
