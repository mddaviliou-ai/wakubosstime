<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO & 社群分享設定 (LINE, Discord 預覽) -->
  <title>Waku野王重生計時</title>
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://wakubosstime.vercel.app/">
  <meta property="og:title" content="Waku野王重生計時">
  <meta property="og:description" content="Waku即時的野王重生倒數追蹤工具。">
  <meta property="og:image" content="https://wakubosstime.vercel.app/logo2.png">
  <link rel="icon" href="./logo2.png" type="image/png">
  
  <!-- 手機主畫面 PWA/App Icon 設定 -->
  <link rel="apple-touch-icon" href="./logo2.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Waku野王計時">
  <link rel="manifest" href="data:application/manifest+json;charset=utf-8,%7B%22name%22%3A%22%E9%87%8E%E7%8E%8B%E9%87%8D%E7%94%9F%E8%A8%88%E6%99%82%E5%99%A8%22%2C%22short_name%22%3A%22%E9%87%8E%E7%8E%8B%E8%A8%88%E6%99%82%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23111827%22%2C%22theme_color%22%3A%22%23111827%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22.%2Flogo2.png%22%2C%22sizes%22%3A%22192x192%20512x512%22%2C%22type%22%3A%22image%2Fpng%22%7D%5D%7D">

  <!-- 引入 Tailwind CSS 樣式 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 定義 ES Modules -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react"
      }
    }
  </script>

  <!-- 引入 Babel 讓瀏覽器即時編譯 React JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen">
  
  <!-- React 掛載點 -->
  <div id="root"></div>

  <!-- 主程式邏輯 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously } from 'firebase/auth';
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDocs, query, where, getDoc } from 'firebase/firestore';
    import { Clock, History, Activity, Plus, Trash2, ShieldAlert, Crosshair, Skull, UserCog, Users, MapPin, ChevronDown, ChevronUp, Search, Image as ImageIcon, Upload, Edit2, X, Flame, RefreshCw, CheckCircle, Server, LogOut, KeyRound, Save, Star } from 'lucide-react';

    // ==========================================
    // 1. Firebase 初始化設定
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyD763KJlKWIEXHCjXcQD3WXxup7DPZbh7Y",
      authDomain: "wakubosstime.firebaseapp.com",
      projectId: "wakubosstime",
      storageBucket: "wakubosstime.firebasestorage.app",
      messagingSenderId: "1005300815484",
      appId: "1:1005300815484:web:2a7724c6f7f0e239839bf9"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 確保 Firestore 存取權限的基礎匿名登入 (作為後台連線基底)
    signInAnonymously(auth).catch(console.error);

    // ==========================================
    // 獨立子組件：管理員會員列表的一列 (修復輸入框因時間更新而跳動的問題)
    // ==========================================
    function AdminUserRow({ user, appUser, showMessage }) {
      const [uName, setUName] = useState(user.username);
      const [uPwd, setUPwd] = useState(user.password);
      const isSelf = user.id === appUser.id;

      const handleSave = async () => {
        if (!uName.trim() || !uPwd.trim()) return showMessage('欄位不可空白', 'error');
        try {
          await updateDoc(doc(db, 'users', user.id), { username: uName.trim(), password: uPwd.trim() });
          showMessage(`已更新 ${uName} 的資料`, 'success');
        } catch (e) { showMessage('更新失敗', 'error'); }
      };

      const handleToggleStatus = async () => {
        if (isSelf) return showMessage('無法更改自己的狀態', 'error');
        const newStatus = user.status === 'approved' ? 'pending' : 'approved';
        await updateDoc(doc(db, 'users', user.id), { status: newStatus });
        showMessage(`已將 ${user.username} 設為 ${newStatus === 'approved' ? '開通' : '停權'}`, 'success');
      };

      return (
        <div className="flex flex-col md:flex-row items-center gap-3 p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-purple-500/50 transition-colors">
          <div className="flex flex-col w-full md:w-1/4">
             <label className="text-xs text-gray-500 mb-1">帳號 (DC名稱)</label>
             <input type="text" value={uName} onChange={e=>setUName(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-purple-500" />
          </div>
          <div className="flex flex-col w-full md:w-1/4">
             <label className="text-xs text-gray-500 mb-1">登入密碼</label>
             <input type="text" value={uPwd} onChange={e=>setUPwd(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-purple-500" />
          </div>
          <div className="flex items-end gap-2 w-full md:w-auto mt-2 md:mt-0 md:pt-5">
            <button onClick={handleSave} className="bg-gray-700 hover:bg-purple-600 text-white p-2 rounded-lg transition-colors flex items-center justify-center" title="儲存修改"><Save className="w-5 h-5"/></button>
          </div>
          <div className="flex flex-1 items-end gap-2 w-full mt-2 md:mt-0 md:pt-5 md:justify-end">
             <button onClick={handleToggleStatus} disabled={isSelf} className={`px-4 py-2 rounded-lg text-sm font-bold w-full md:w-auto transition-colors ${user.status === 'approved' ? 'bg-green-600/20 text-green-400 border border-green-500/50 hover:bg-green-600/30' : 'bg-red-600/20 text-red-400 border border-red-500/50 hover:bg-red-600/30 animate-pulse'} disabled:opacity-50 disabled:grayscale`}>
               {user.status === 'approved' ? '🟢 已開通 (點擊停權)' : '🔴 審核中 (點擊開通)'}
             </button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 2. 子組件：登入與註冊畫面
    // ==========================================
    function AuthScreen({ setAppUser, showMessage }) {
      const [isLogin, setIsLogin] = useState(true);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const trimmedUser = username.trim();
        if (!trimmedUser) return;
        setIsLoading(true);

        try {
          if (isLogin) {
            // --- 登入邏輯 ---
            const q = query(collection(db, 'users'), where('username', '==', trimmedUser));
            const snap = await getDocs(q);
            
            // 特殊處理：超級管理員自動建立機制
            if (snap.empty) {
              if (trimmedUser === '茶米' && password === 'zaza') {
                const docRef = await addDoc(collection(db, 'users'), {
                  username: '茶米', password: 'zaza', role: 'admin', status: 'approved', createdAt: Date.now()
                });
                const adminUser = { id: docRef.id, username: '茶米', role: 'admin', status: 'approved' };
                localStorage.setItem('wakuboss_user_id', docRef.id);
                setAppUser(adminUser);
                showMessage('管理員帳號已自動建立並登入', 'success');
                return;
              }
              showMessage('找不到此帳號，請確認或前往註冊', 'error');
              setIsLoading(false);
              return;
            }

            let foundUser = null;
            snap.forEach(d => { if (d.data().password === password) foundUser = { id: d.id, ...d.data() }; });
            
            if (foundUser) {
              localStorage.setItem('wakuboss_user_id', foundUser.id);
              setAppUser(foundUser);
              showMessage(`歡迎回來，${foundUser.username}`, 'success');
            } else {
              showMessage('密碼錯誤', 'error');
            }
          } else {
            // --- 註冊邏輯 ---
            const q = query(collection(db, 'users'), where('username', '==', trimmedUser));
            const snap = await getDocs(q);
            if (!snap.empty) {
              showMessage('此帳號已被註冊', 'error');
              setIsLoading(false);
              return;
            }

            const pass = password || '1234'; // 預設密碼 1234
            const isAdmin = trimmedUser === '茶米' && pass === 'zaza';
            
            const newUser = {
              username: trimmedUser,
              password: pass,
              role: isAdmin ? 'admin' : 'user',
              status: isAdmin ? 'approved' : 'pending',
              createdAt: Date.now()
            };

            const docRef = await addDoc(collection(db, 'users'), newUser);
            localStorage.setItem('wakuboss_user_id', docRef.id);
            setAppUser({ id: docRef.id, ...newUser });
            showMessage(isAdmin ? '管理員註冊成功' : '註冊成功，請等待管理員開通', 'success');
          }
        } catch (error) {
          console.error(error);
          showMessage('發生錯誤，請確認網路連線或資料庫權限', 'error');
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 w-full max-w-md animate-in zoom-in-95 duration-300">
            <div className="flex flex-col items-center mb-8">
              <div className="w-20 h-20 mb-4 bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-700 overflow-hidden shadow-lg">
                <img src="./logo2.png" alt="Logo" className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
              </div>
              <h1 className="text-2xl font-bold text-white tracking-wide">Waku野王重生計時</h1>
              <p className="text-gray-400 mt-2">{isLogin ? '登入以繼續使用' : '註冊新帳號'}</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm text-gray-400 mb-1">帳號</label>
                <input
                  type="text"
                  value={username}
                  onChange={e => setUsername(e.target.value)}
                  placeholder={isLogin ? "請輸入帳號" : "建議填寫 DC 名稱"}
                  className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                  required
                />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">密碼</label>
                <input
                  type="password"
                  value={password}
                  onChange={e => setPassword(e.target.value)}
                  placeholder={isLogin ? "請輸入密碼" : "未填寫則預設為 1234"}
                  className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all"
                />
              </div>
              
              <button type="submit" disabled={isLoading} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/30 flex justify-center items-center gap-2 mt-4 disabled:opacity-50">
                {isLoading && <Activity className="w-5 h-5 animate-spin" />}
                {isLogin ? '登入' : '註冊'}
              </button>
            </form>

            <div className="mt-6 text-center text-gray-400 text-sm">
              {isLogin ? '還沒有帳號嗎？' : '已經有帳號了？'}
              <button onClick={() => { setIsLogin(!isLogin); setUsername(''); setPassword(''); }} className="text-blue-400 hover:text-blue-300 ml-2 font-medium underline underline-offset-4 transition-colors">
                {isLogin ? '立即註冊' : '返回登入'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ==========================================
    // 3. 子組件：審核中畫面
    // ==========================================
    function PendingScreen({ onLogout }) {
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 text-center max-w-sm animate-in fade-in duration-500">
            <UserCog className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
            <h2 className="text-xl font-bold text-white mb-2">帳號審核中</h2>
            <p className="text-gray-400 mb-8 leading-relaxed">您的帳號尚未開通。<br/>請通知管理員 (茶米) 協助審核開通，開通後即可自動進入系統。</p>
            <button onClick={onLogout} className="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2.5 rounded-xl font-medium transition-colors flex items-center justify-center gap-2 mx-auto">
              <LogOut className="w-4 h-4" /> 登出並返回
            </button>
          </div>
        </div>
      );
    }

    // ==========================================
    // 4. 子組件：主應用程式 (已開通)
    // ==========================================
    function MainApp({ appUser, onLogout, showMessage }) {
      const isAdmin = appUser.role === 'admin';
      
      // 資料狀態
      const [bossTemplates, setBossTemplates] = useState([]);
      const [activeBosses, setActiveBosses] = useState([]);
      const [allUsers, setAllUsers] = useState([]); // 給管理員用的會員清單
      const [now, setNow] = useState(Date.now());
      
      // UI 狀態
      const [activeModalBossId, setActiveModalBossId] = useState(null); // 控制彈出視窗顯示的 BOSS
      const [modalPage, setModalPage] = useState(1); // 彈出視窗的分流列表分頁
      const [modalChannelInput, setModalChannelInput] = useState(''); // Modal 內的快速登記分流
      const [adminTab, setAdminTab] = useState('home'); // 'home' | 'boss' | 'users'
      const [showPwdModal, setShowPwdModal] = useState(false);
      const [newPwd, setNewPwd] = useState('');
      
      // 個人釘選狀態 (存在 LocalStorage)
      const [pinnedBosses, setPinnedBosses] = useState(() => {
        const saved = localStorage.getItem(`wakuboss_pinned_${appUser.id}`);
        return saved ? JSON.parse(saved) : [];
      });
      
      // 排序狀態
      const [bossSort, setBossSort] = useState('levelAsc'); // 'levelAsc', 'levelDesc', 'earliest', 'hasRecordOnly'
      const [adminSortOrder, setAdminSortOrder] = useState('levelDesc'); // 'name', 'levelDesc', 'levelAsc'
      
      // 表單狀態
      const [newTemplateName, setNewTemplateName] = useState('');
      const [newTemplateLevel, setNewTemplateLevel] = useState('');
      const [newTemplateMinCD, setNewTemplateMinCD] = useState(60);
      const [newTemplateMaxCD, setNewTemplateMaxCD] = useState(60);
      const [newTemplateImage, setNewTemplateImage] = useState(null);
      const [isAddingTemplate, setIsAddingTemplate] = useState(false);
      const [editingTemplateId, setEditingTemplateId] = useState(null);
      const [showBossForm, setShowBossForm] = useState(true);
      const [showUserList, setShowUserList] = useState(true);
      
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTemplateId, setSelectedTemplateId] = useState('');
      const [channelInput, setChannelInput] = useState('');
      const [isReporting, setIsReporting] = useState(false);
      const [isResettingGlobal, setIsResettingGlobal] = useState(false);
      const [globalBaseTime, setGlobalBaseTime] = useState(''); // 管理員自訂基準時間

      // --- 計時器 Setup ---
      useEffect(() => {
        const timerInterval = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(timerInterval);
      }, []);

      // 監聽釘選狀態改變時寫入 LocalStorage
      useEffect(() => {
        localStorage.setItem(`wakuboss_pinned_${appUser.id}`, JSON.stringify(pinnedBosses));
      }, [pinnedBosses, appUser.id]);

      // 釘選 / 取消釘選邏輯
      const togglePin = (e, bossId) => {
        e.stopPropagation();
        setPinnedBosses(prev => {
          if (prev.includes(bossId)) return prev.filter(id => id !== bossId);
          return [...prev, bossId];
        });
      };

      // 清空 Modal 內的分流輸入框與重置頁碼
      useEffect(() => {
        if (!activeModalBossId) {
          setModalChannelInput('');
          setModalPage(1);
        }
      }, [activeModalBossId]);

      // --- 資料庫監聽 ---
      useEffect(() => {
        const unsubscribeTemplates = onSnapshot(collection(db, 'bossTemplates'), (snapshot) => {
          const templatesData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          setBossTemplates(templatesData);
        });

        const unsubscribeActive = onSnapshot(collection(db, 'activeBosses'), (snapshot) => {
          const activeData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          setActiveBosses(activeData);
        });

        let unsubscribeUsers = () => {};
        if (isAdmin) {
          unsubscribeUsers = onSnapshot(collection(db, 'users'), (snapshot) => {
            const usersData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            // 把未審核的排在前面，然後按時間排序
            usersData.sort((a, b) => {
              if (a.status !== b.status) return a.status === 'pending' ? -1 : 1;
              return b.createdAt - a.createdAt;
            });
            setAllUsers(usersData);
          });
        }

        return () => {
          unsubscribeTemplates();
          unsubscribeActive();
          unsubscribeUsers();
        };
      }, [isAdmin]);

      // --- 輔助資料與邏輯 ---
      const templateMap = useMemo(() => {
        const map = {};
        bossTemplates.forEach(t => map[t.id] = t);
        return map;
      }, [bossTemplates]);

      const filteredTemplates = useMemo(() => {
        let result = bossTemplates.filter(t => t.name.toLowerCase().includes(searchQuery.toLowerCase()));
        // 強制依照等級低到高排序
        return result.sort((a, b) => (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name));
      }, [bossTemplates, searchQuery]);

      // 管理員頁面的 BOSS 列表排序
      const sortedAdminTemplates = useMemo(() => {
        return [...bossTemplates].sort((a, b) => {
            if (adminSortOrder === 'levelDesc') return (b.level || 0) - (a.level || 0) || a.name.localeCompare(b.name);
            if (adminSortOrder === 'levelAsc') return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
            return a.name.localeCompare(b.name); // 預設名稱排序
        });
      }, [bossTemplates, adminSortOrder]);

      useEffect(() => {
        if (filteredTemplates.length > 0) {
          if (!filteredTemplates.find(t => t.id === selectedTemplateId)) {
            setSelectedTemplateId(filteredTemplates[0].id);
          }
        } else {
          setSelectedTemplateId('');
        }
      }, [filteredTemplates, selectedTemplateId]);

      // 效能優化：從依賴中移除 now，避免每秒重新建構整個陣列與排序
      const displayBosses = useMemo(() => {
        let processed = bossTemplates.map(template => {
          const channels = activeBosses.filter(b => b.templateId === template.id);
          let effectiveGlobalSpawn = null;
          let effectiveGlobalMaxSpawn = null;
          if (template.globalIsAlive) {
              effectiveGlobalSpawn = 0; effectiveGlobalMaxSpawn = 0;
          } else if (template.globalNextSpawn) {
              effectiveGlobalSpawn = template.globalNextSpawn;
              effectiveGlobalMaxSpawn = template.globalMaxSpawn || template.globalNextSpawn; // fallback
          }

          let earliest = effectiveGlobalSpawn;
          let earliestMax = effectiveGlobalMaxSpawn;
          channels.forEach(ch => {
            if (earliest === null || ch.nextSpawn < earliest) {
                earliest = ch.nextSpawn;
                earliestMax = ch.maxSpawn || ch.nextSpawn;
            }
          });

          // 【修正邏輯】: 必須是有玩家回報分流，或是管理員手動標記重生 / 全域計時尚未過期，才算作「有紀錄」
          const isGlobalActive = template.globalIsAlive || (effectiveGlobalMaxSpawn !== null && effectiveGlobalMaxSpawn > Date.now());
          const hasRecord = channels.length > 0 || isGlobalActive;

          return { ...template, channels, effectiveGlobalSpawn, effectiveGlobalMaxSpawn, earliestSpawn: earliest, earliestMaxSpawn: earliestMax, hasRecord };
        });

        // 判斷是否為「只顯示有紀錄」模式
        if (bossSort === 'hasRecordOnly') {
          // 【修正邏輯】: 就算沒有紀錄，只要玩家有釘選(pinned)，就強制顯示不受隱藏規則影響
          processed = processed.filter(b => pinnedBosses.includes(b.id) || b.hasRecord);
        }

        // 排序邏輯 (包含釘選置頂邏輯)
        return processed.sort((a, b) => {
           const aPinned = pinnedBosses.includes(a.id);
           const bPinned = pinnedBosses.includes(b.id);
           
           // 釘選強制在最前面
           if (aPinned && !bPinned) return -1;
           if (!aPinned && bPinned) return 1;

           if (bossSort === 'levelDesc') return (b.level || 0) - (a.level || 0) || a.name.localeCompare(b.name);
           if (bossSort === 'levelAsc' || bossSort === 'hasRecordOnly') return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
           
           // 'earliest' -> 改為依照管理員設定的 CD 時間 (快到慢) 排序
           const aCD = a.minCooldown || a.cooldownMinutes || Infinity;
           const bCD = b.minCooldown || b.cooldownMinutes || Infinity;
           
           // 如果 CD 時間相同，則依等級 (低到高) -> 名稱排序作為次要條件
           if (aCD === bCD) {
               return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
           }
           
           return aCD - bCD;
        });
      }, [bossTemplates, activeBosses, bossSort, pinnedBosses]); 

      // --- 個人密碼修改 ---
      const handleChangePassword = async (e) => {
        e.preventDefault();
        if (!newPwd.trim()) return;
        try {
          await updateDoc(doc(db, 'users', appUser.id), { password: newPwd.trim() });
          showMessage('密碼修改成功！', 'success');
          setShowPwdModal(false);
          setNewPwd('');
        } catch (err) {
          showMessage('密碼修改失敗', 'error');
        }
      };

      // --- 管理員操作事件 ---
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 120;
            let width = img.width, height = img.height;
            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            setNewTemplateImage(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      const handleSaveTemplate = async (e) => {
        e.preventDefault();
        if (!newTemplateName.trim() || newTemplateMinCD <= 0) return;
        const minCD = Number(newTemplateMinCD);
        const maxCD = Number(newTemplateMaxCD) || minCD;
        const level = newTemplateLevel ? Number(newTemplateLevel) : null;
        if (maxCD < minCD) { showMessage("最大CD不能小於最小CD", "error"); return; }
        
        try {
          setIsAddingTemplate(true);
          const templateData = { 
            name: newTemplateName.trim(), 
            level: level,
            minCooldown: minCD,
            maxCooldown: maxCD,
            cooldownMinutes: minCD, // 保留舊欄位以防萬一
            imageUrl: newTemplateImage 
          };
          if (editingTemplateId) {
            await updateDoc(doc(db, 'bossTemplates', editingTemplateId), templateData);
            setEditingTemplateId(null);
            showMessage("種類修改成功", "success");
          } else {
            await addDoc(collection(db, 'bossTemplates'), { 
              ...templateData,
              createdBy: appUser.id, 
              createdAt: Date.now(), 
              globalNextSpawn: null, 
              globalIsAlive: false 
            });
            showMessage("種類新增成功", "success");
          }
          setNewTemplateName(''); setNewTemplateLevel(''); setNewTemplateMinCD(60); setNewTemplateMaxCD(60); setNewTemplateImage(null);
        } catch (error) { showMessage("儲存失敗", "error"); } finally { setIsAddingTemplate(false); }
      };

      const handleCancelEdit = () => { setEditingTemplateId(null); setNewTemplateName(''); setNewTemplateLevel(''); setNewTemplateMinCD(60); setNewTemplateMaxCD(60); setNewTemplateImage(null); };

      const handleEditClick = (template) => {
        setEditingTemplateId(template.id); 
        setNewTemplateName(template.name); 
        setNewTemplateLevel(template.level || '');
        setNewTemplateMinCD(template.minCooldown || template.cooldownMinutes || 60);
        setNewTemplateMaxCD(template.maxCooldown || template.cooldownMinutes || 60);
        setNewTemplateImage(template.imageUrl || null);
        setShowBossForm(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleDeleteTemplate = async (templateId) => {
        if (!window.confirm("確定要刪除這個種類嗎？")) return;
        try { await deleteDoc(doc(db, 'bossTemplates', templateId)); showMessage("刪除成功", "success"); } catch (error) { showMessage("刪除失敗", "error"); }
      };

      const handleDeleteActiveBoss = async (activeId) => {
        if (!window.confirm("確定要手動刪除這筆分流計時紀錄嗎？")) return;
        try { await deleteDoc(doc(db, 'activeBosses', activeId)); showMessage("已刪除分流紀錄", "success"); } catch(e) { showMessage("刪除失敗", "error"); }
      };

      const handleResetAllBosses = async () => {
        if (!window.confirm("【警告】確定要重置所有王的計算時間，並清除目前所有的分流紀錄嗎？\n(將使用您輸入的基準時間計算)")) return;
        try {
          setIsResettingGlobal(true);
          const baseTime = globalBaseTime ? new Date(globalBaseTime).getTime() : Date.now();
          const activeSnap = await getDocs(collection(db, 'activeBosses'));
          await Promise.all(activeSnap.docs.map(d => deleteDoc(d.ref)));
          await Promise.all(bossTemplates.map(t => updateDoc(doc(db, 'bossTemplates', t.id), { 
            globalNextSpawn: baseTime + ((t.minCooldown || t.cooldownMinutes) * 60 * 1000), 
            globalMaxSpawn: baseTime + ((t.maxCooldown || t.minCooldown || t.cooldownMinutes) * 60 * 1000), 
            globalIsAlive: false 
          })));
          showMessage("全伺服器王重生時間已重置！", "success");
        } catch (error) { showMessage("全域重置失敗", "error"); } finally { setIsResettingGlobal(false); }
      };

      const handleGlobalResetSingle = async (template) => {
        try {
          const baseTime = globalBaseTime ? new Date(globalBaseTime).getTime() : Date.now();
          await updateDoc(doc(db, 'bossTemplates', template.id), { 
            globalNextSpawn: baseTime + ((template.minCooldown || template.cooldownMinutes) * 60 * 1000), 
            globalMaxSpawn: baseTime + ((template.maxCooldown || template.minCooldown || template.cooldownMinutes) * 60 * 1000), 
            globalIsAlive: false 
          }); 
          showMessage(`${template.name} 已開始全線倒數`, "success"); 
        } catch (e) { showMessage("設定失敗", "error"); }
      };

      const handleGlobalSpawnSingle = async (template) => {
        try { await updateDoc(doc(db, 'bossTemplates', template.id), { globalNextSpawn: 0, globalIsAlive: true }); showMessage(`${template.name} 已標記為全線重生`, "success"); } catch (e) { showMessage("設定失敗", "error"); }
      };

      // --- 玩家通報 ---
      const handleReportKill = async (e) => {
        e.preventDefault();
        if (!selectedTemplateId || !channelInput.trim()) return;
        const template = templateMap[selectedTemplateId];
        if (!template) return;
        try {
          setIsReporting(true);
          const activeBossId = `${template.id}_${channelInput.trim()}`.replace(/[^a-zA-Z0-9_]/g, '_');
          const killTime = Date.now();
          const minCD = template.minCooldown || template.cooldownMinutes || 60;
          const maxCD = template.maxCooldown || template.cooldownMinutes || 60;
          await setDoc(doc(db, 'activeBosses', activeBossId), {
            templateId: template.id, bossName: template.name, channel: channelInput.trim(), cooldownMinutes: minCD, maxCooldown: maxCD, lastKilled: killTime, nextSpawn: killTime + (minCD * 60 * 1000), maxSpawn: killTime + (maxCD * 60 * 1000), reportedBy: appUser.id, reporterName: appUser.username
          });
          setChannelInput(''); showMessage(`已成功回報 ${template.name} (${channelInput.trim()}頻)`, "success");
        } catch (error) { showMessage("錯誤: 通報失敗，請確認權限", "error"); } finally { setIsReporting(false); }
      };

      // --- Modal 內的快速登記 ---
      const handleModalQuickAdd = async (template) => {
        if (!modalChannelInput.trim()) return;
        try {
          setIsReporting(true);
          const activeBossId = `${template.id}_${modalChannelInput.trim()}`.replace(/[^a-zA-Z0-9_]/g, '_');
          const killTime = Date.now();
          const minCD = template.minCooldown || template.cooldownMinutes || 60;
          const maxCD = template.maxCooldown || template.cooldownMinutes || 60;
          await setDoc(doc(db, 'activeBosses', activeBossId), {
            templateId: template.id, bossName: template.name, channel: modalChannelInput.trim(), cooldownMinutes: minCD, maxCooldown: maxCD, lastKilled: killTime, nextSpawn: killTime + (minCD * 60 * 1000), maxSpawn: killTime + (maxCD * 60 * 1000), reportedBy: appUser.id, reporterName: appUser.username
          });
          setModalChannelInput('');
          showMessage(`已成功回報 ${template.name} (${modalChannelInput.trim()}頻)`, "success");
        } catch (error) { showMessage("錯誤: 通報失敗，請確認權限", "error"); } finally { setIsReporting(false); }
      };

      const handleQuickReportKill = async (active) => {
        try {
          const template = templateMap[active.templateId];
          if (!template) return;
          const minCD = template.minCooldown || template.cooldownMinutes || 60;
          const maxCD = template.maxCooldown || template.cooldownMinutes || 60;
          const killTime = Date.now();
          await updateDoc(doc(db, 'activeBosses', active.id), {
            cooldownMinutes: minCD,
            maxCooldown: maxCD,
            lastKilled: killTime,
            nextSpawn: killTime + (minCD * 60 * 1000),
            maxSpawn: killTime + (maxCD * 60 * 1000),
            reportedBy: appUser.id,
            reporterName: appUser.username
          });
          showMessage(`已重新登記 ${template.name} (${active.channel}頻) 擊殺`, "success");
        } catch (e) {
          showMessage("重新登記失敗，請確認權限", "error");
        }
      };

      // --- 管理員：一鍵清除該王確定重生超過 4 小時的紀錄 ---
      const handleClearStaleRecords = async (group) => {
        const FOUR_HOURS = 4 * 60 * 60 * 1000;
        const staleRecords = group.channels.filter(ch => {
          const spawnTime = ch.maxSpawn || ch.nextSpawn;
          return (now - spawnTime) >= FOUR_HOURS;
        });

        if (staleRecords.length === 0) {
          showMessage('目前沒有確定重生超過 4 小時的紀錄', 'success');
          return;
        }

        if (!window.confirm(`確定要清除 ${staleRecords.length} 筆「確定重生」已超過 4 小時的分流紀錄嗎？`)) return;

        try {
          setIsReporting(true);
          await Promise.all(staleRecords.map(ch => deleteDoc(doc(db, 'activeBosses', ch.id))));
          showMessage(`已成功清除 ${staleRecords.length} 筆過期紀錄`, 'success');
        } catch (error) {
          showMessage("清除失敗，請確認權限", "error");
        } finally {
          setIsReporting(false);
        }
      };

      const formatCountdown = (nextSpawnTime, maxSpawnTime) => {
        if (!nextSpawnTime) return { text: '未知', state: 'unknown' };
        const diffMin = nextSpawnTime - now;
        const diffMax = (maxSpawnTime || nextSpawnTime) - now;
        
        const pad = (n) => String(n).padStart(2, '0');
        const formatTime = (diff) => {
          const h = Math.floor(diff / (1000 * 60 * 60));
          const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const s = Math.floor((diff % (1000 * 60)) / 1000);
          return `${pad(h)}:${pad(m)}:${pad(s)}`;
        };

        if (diffMin > 0) {
          return { text: `${formatTime(diffMin)}`, state: 'waiting' };
        } else if (diffMax > 0) {
          return { text: `${formatTime(diffMax)}`, state: 'floating' }; 
        } else {
          return { text: '🟢 確定重生', state: 'spawned' }; 
        }
      };

      return (
        <div className="p-4 md:p-8 font-sans">
          
          {/* 修改密碼 Modal */}
          {showPwdModal && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 animate-in fade-in">
              <div className="bg-gray-800 p-6 rounded-2xl border border-gray-700 w-full max-w-sm shadow-2xl">
                <h3 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><KeyRound className="w-5 h-5 text-blue-400"/> 修改個人密碼</h3>
                <form onSubmit={handleChangePassword}>
                  <label className="block text-sm text-gray-400 mb-1">新密碼</label>
                  <input type="text" value={newPwd} onChange={e=>setNewPwd(e.target.value)} placeholder="請輸入新密碼" className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 mb-6" required />
                  <div className="flex gap-3">
                    <button type="button" onClick={() => setShowPwdModal(false)} className="flex-1 bg-gray-700 hover:bg-gray-600 text-white font-medium py-2.5 rounded-xl transition-colors">取消</button>
                    <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 rounded-xl transition-colors">確認儲存</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* BOSS 詳細資訊 Modal */}
          {activeModalBossId && (() => {
            const group = displayBosses.find(g => g.id === activeModalBossId);
            if (!group) {
              setActiveModalBossId(null);
              return null;
            }
            const { text: earliestText, state: earliestState } = formatCountdown(group.earliestSpawn, group.earliestMaxSpawn);
            const warningCount = group.channels.filter(ch => {
              const diff = ch.nextSpawn - now;
              return diff > 0 && diff <= 10 * 60 * 1000;
            }).length;

            return (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 animate-in fade-in" onClick={() => setActiveModalBossId(null)}>
                <div className="bg-gray-800 rounded-2xl border border-gray-700 w-full max-w-lg shadow-2xl flex flex-col max-h-[85vh] animate-in zoom-in-95 duration-200" onClick={e => e.stopPropagation()}>
                  
                  {/* Modal Header */}
                  <div className="p-4 sm:p-5 border-b border-gray-700 flex items-center justify-between bg-gray-800/80 rounded-t-2xl shrink-0">
                    <div className="flex items-center gap-4">
                      <div className={`flex shrink-0 w-12 h-12 rounded-xl bg-gray-900 items-center justify-center border overflow-hidden ${earliestState === 'spawned' ? 'border-green-500/40' : earliestState === 'floating' ? 'border-yellow-500/40' : warningCount > 0 ? 'border-red-500/40' : 'border-gray-700'}`}>
                        {group.imageUrl ? <img src={group.imageUrl} alt={group.name} className="w-full h-full object-cover" /> : <Skull className={`w-6 h-6 ${earliestState === 'spawned' ? 'text-green-400' : earliestState === 'floating' ? 'text-yellow-400' : warningCount > 0 ? 'text-red-400' : 'text-gray-500'}`} />}
                      </div>
                      <div className="flex flex-col">
                        <div className="flex items-center flex-wrap gap-2">
                          <h3 className="text-lg sm:text-xl font-bold text-white">{group.name}</h3>
                          {group.level && <span className="text-yellow-400 text-sm sm:text-base font-bold">Lv.{group.level}</span>}
                          <span className="text-[11px] sm:text-xs text-gray-400 bg-gray-900 px-2 py-0.5 rounded border border-gray-700 font-medium whitespace-nowrap ml-0.5">
                            CD: {group.minCooldown || group.cooldownMinutes}{group.maxCooldown && group.maxCooldown !== (group.minCooldown || group.cooldownMinutes) ? `~${group.maxCooldown}` : ''}分
                          </span>
                        </div>
                        <div className="text-sm mt-1 flex items-center gap-1.5 sm:gap-2">
                          <span className="text-gray-400">{earliestState === 'waiting' ? '最快重生:' : '狀態:'}</span>
                          <span className={`font-mono ${earliestState === 'spawned' ? 'text-green-400 font-bold drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]' : earliestState === 'floating' ? 'text-yellow-400 font-bold drop-shadow-[0_0_5px_rgba(250,204,21,0.3)]' : 'text-red-400'}`}>
                            {earliestText} 
                          </span>
                        </div>
                      </div>
                    </div>
                    <button onClick={() => setActiveModalBossId(null)} className="p-2 bg-gray-900 hover:bg-gray-700 rounded-full transition-colors shrink-0">
                      <X className="w-5 h-5 text-gray-400" />
                    </button>
                  </div>

                  {/* Modal Body (分流列表) */}
                  <div className="p-4 sm:p-5 overflow-y-auto flex flex-col gap-3">
                    
                    {/* 快速登記區塊 */}
                    <form onSubmit={(e) => { e.preventDefault(); handleModalQuickAdd(group); }} className="flex items-center gap-2 bg-gray-900/60 p-2 sm:p-3 rounded-xl border border-gray-700/80 shrink-0">
                      <div className="flex-1 relative">
                        <MapPin className="w-4 h-4 text-gray-500 absolute left-3 top-1/2 -translate-y-1/2" />
                        <input type="text" value={modalChannelInput} onChange={e => setModalChannelInput(e.target.value)} placeholder="輸入分流快速登記 (例: 3)" className="w-full bg-gray-800 border border-gray-600 rounded-lg pl-9 pr-3 py-2 text-white text-sm focus:outline-none focus:border-blue-500" required />
                      </div>
                      <button type="submit" disabled={isReporting || !modalChannelInput.trim()} className="bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-lg text-sm transition-colors shrink-0 disabled:opacity-50">
                        登記
                      </button>
                    </form>

                    {/* 狀態顏色說明 Legend & 清除過期紀錄按鈕 */}
                    <div className="flex flex-wrap items-center justify-between gap-3 shrink-0 mb-1">
                      <div className="flex flex-wrap items-center gap-4 bg-gray-900/40 p-2.5 rounded-xl border border-gray-700/50">
                        <div className="flex items-center gap-2 text-xs text-red-400 font-medium">
                          <div className="w-2.5 h-2.5 rounded-[3px] bg-red-900/80 border border-red-500/50"></div>
                          預估10分鐘重生
                        </div>
                        <div className="flex items-center gap-2 text-xs text-yellow-400 font-medium">
                          <div className="w-2.5 h-2.5 rounded-[3px] bg-yellow-900/80 border border-yellow-500/50"></div>
                          時間內可能重生
                        </div>
                      </div>
                      
                      {isAdmin && group.channels.length > 0 && (
                        <button onClick={() => handleClearStaleRecords(group)} disabled={isReporting} className="flex items-center gap-1.5 px-3 py-2 bg-gray-800 hover:bg-red-900/40 text-gray-400 hover:text-red-400 border border-gray-700 hover:border-red-500/50 rounded-xl text-xs font-bold transition-all disabled:opacity-50">
                          <Trash2 className="w-3.5 h-3.5" /> 清除過期 (4hr+)
                        </button>
                      )}
                    </div>

                    {/* 全伺服器狀態條 */}
                    {group.effectiveGlobalSpawn !== null && (() => {
                      const { text: globalText, state: globalState } = formatCountdown(group.effectiveGlobalSpawn, group.effectiveGlobalMaxSpawn);
                      return (
                      <div className={`flex items-center justify-between p-3 rounded-xl border relative overflow-hidden ${globalState === 'spawned' ? 'bg-green-500/10 border-green-500/40 shadow-[0_0_10px_rgba(34,197,94,0.1)]' : globalState === 'floating' ? 'bg-yellow-900/20 border-yellow-500/40' : 'bg-purple-900/20 border-purple-500/40'}`}>
                        <div className="flex items-center gap-3 relative z-10">
                          <div className={`flex flex-col items-center justify-center border rounded-lg px-3 py-1 min-w-[4rem] ${globalState === 'spawned' ? 'bg-green-900/50 border-green-500/50' : globalState === 'floating' ? 'bg-yellow-900/50 border-yellow-500/50' : 'bg-purple-900/50 border-purple-500/50'}`}>
                            <Server className={`w-4 h-4 mb-0.5 ${globalState === 'spawned' ? 'text-green-400' : globalState === 'floating' ? 'text-yellow-400' : 'text-purple-400'}`} />
                            <span className={`font-bold text-xs leading-tight ${globalState === 'spawned' ? 'text-green-300' : globalState === 'floating' ? 'text-yellow-300' : 'text-purple-300'}`}>全伺服器</span>
                          </div>
                          <div className="text-xs text-gray-400 flex flex-col gap-1">
                            <span className="text-gray-300 tracking-wide">系統維修 / 全域計時</span>
                          </div>
                        </div>
                        <div className="flex items-center gap-3 relative z-10">
                          <span className={`font-mono font-medium tracking-wide text-sm sm:text-base ${globalState === 'spawned' ? 'text-green-400 drop-shadow-[0_0_8px_rgba(74,222,128,0.4)]' : globalState === 'floating' ? 'text-yellow-400' : 'text-purple-400'}`}>
                            {globalText}
                          </span>
                        </div>
                      </div>
                      );
                    })()}

                    {/* 玩家回報的分流 */}
                    {group.channels.length === 0 && group.effectiveGlobalSpawn === null && (
                      <p className="text-gray-500 text-center py-4 text-sm">目前沒有任何分流紀錄</p>
                    )}
                    {group.channels.length > 0 && (() => {
                      const sortedChannels = [...group.channels].sort((a, b) => a.nextSpawn - b.nextSpawn);
                      const itemsPerPage = 10;
                      const totalPages = Math.max(1, Math.ceil(sortedChannels.length / itemsPerPage));
                      const safePage = Math.min(modalPage, totalPages);
                      const paginatedChannels = sortedChannels.slice((safePage - 1) * itemsPerPage, safePage * itemsPerPage);

                      return (
                        <>
                          {paginatedChannels.map(active => {
                            const { text: timeText, state } = formatCountdown(active.nextSpawn, active.maxSpawn);
                            const isWarning = state === 'waiting' && (active.nextSpawn - now) <= 10 * 60 * 1000;
                            const isFloating = state === 'floating';
                            const isSpawned = state === 'spawned';
                            
                            // 判斷是否可以刪除: 管理員 或 是自己回報的
                            const canDelete = isAdmin || active.reportedBy === appUser.id;
                            
                            return (
                              <div key={active.id} className={`flex items-center justify-between p-2.5 sm:p-3 rounded-xl border relative transition-all duration-300 overflow-hidden ${isSpawned ? 'bg-green-500/10 border-green-500/30' : isFloating ? 'bg-yellow-500/10 border-yellow-500/40 shadow-[0_0_15px_rgba(234,179,8,0.15)]' : isWarning ? 'bg-red-900/30 border-red-500/60 shadow-[0_0_15px_rgba(239,68,68,0.2)]' : 'bg-gray-800 border-gray-700'}`}>
                                {isWarning && <div className="absolute inset-0 bg-red-500/5 animate-pulse pointer-events-none"></div>}
                                
                                <div className="flex items-center gap-2 sm:gap-3 relative z-10 w-full max-w-[50%]">
                                  <div className={`flex items-center justify-center border rounded-lg px-2 sm:px-3 py-1.5 min-w-[3rem] sm:min-w-[4.5rem] shrink-0 ${isSpawned ? 'bg-green-900/50 border-green-500/50' : isFloating ? 'bg-yellow-900/50 border-yellow-500/50' : isWarning ? 'bg-red-900/50 border-red-500/50' : 'bg-gray-900 border-gray-600'}`}>
                                    <div className={`font-bold leading-none flex items-baseline justify-center ${isSpawned ? 'text-green-400' : isFloating ? 'text-yellow-400' : isWarning ? 'text-red-400' : 'text-blue-400'}`}>
                                      <span className="text-[15px] sm:text-lg">{active.channel}</span>
                                    </div>
                                  </div>
                                  <div className="text-[10px] sm:text-xs text-gray-400 flex flex-col gap-1 min-w-0">
                                    <span className="flex items-center gap-1 text-gray-300 whitespace-nowrap">
                                      <History className="w-3 h-3 sm:w-3.5 sm:h-3.5 shrink-0"/> 
                                      {new Date(active.lastKilled).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false })}
                                      <span className="text-blue-300/80 ml-1 font-medium inline-block max-w-[45px] sm:max-w-none truncate align-bottom" title={active.reporterName}>({active.reporterName || '未知'})</span>
                                    </span>
                                  </div>
                                </div>
                                <div className="flex items-center justify-end gap-1.5 sm:gap-3 relative z-10">
                                  {isWarning && <Flame className="w-4 h-4 sm:w-5 sm:h-5 text-red-500 animate-bounce" />}
                                  
                                  {isSpawned ? (
                                    <div className="flex items-center gap-1.5 sm:gap-2">
                                      <button onClick={(e) => { e.stopPropagation(); handleQuickReportKill(active); }} className="px-2.5 sm:px-3 py-1 sm:py-1.5 bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 border border-blue-500/30 rounded-lg text-xs sm:text-sm font-bold transition-colors whitespace-nowrap">擊殺</button>
                                      <button onClick={(e) => { e.stopPropagation(); handleDeleteActiveBoss(active.id); }} className="px-2.5 sm:px-3 py-1 sm:py-1.5 bg-gray-700/50 text-gray-400 hover:bg-gray-600 border border-gray-600/50 rounded-lg text-xs sm:text-sm font-bold transition-colors whitespace-nowrap">無王</button>
                                    </div>
                                  ) : isFloating ? (
                                    <div className="flex items-center gap-1.5 sm:gap-2">
                                      <span className="font-mono tracking-wide text-yellow-400 font-bold drop-shadow-[0_0_8px_rgba(250,204,21,0.4)] mr-1 text-xs sm:text-base">
                                        {timeText}
                                      </span>
                                      <button onClick={(e) => { e.stopPropagation(); handleQuickReportKill(active); }} className="px-2.5 sm:px-3 py-1 sm:py-1.5 bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 border border-blue-500/30 rounded-lg text-xs sm:text-sm font-bold transition-colors whitespace-nowrap">擊殺</button>
                                    </div>
                                  ) : (
                                    <span className={`font-mono font-medium tracking-wide text-xs sm:text-base ${isWarning ? 'text-red-400 font-bold' : 'text-gray-300'}`}>
                                      {timeText}
                                    </span>
                                  )}

                                  {canDelete && !isSpawned && (
                                    <button onClick={(e) => { e.stopPropagation(); handleDeleteActiveBoss(active.id); }} className={`p-1.5 rounded-lg transition-colors border border-transparent ml-1 ${isWarning ? 'text-red-300 hover:bg-red-500/20' : 'text-gray-500 hover:text-red-400 hover:bg-red-500/10 hover:border-red-500/20'}`} title={isAdmin ? "管理員刪除此紀錄" : "刪除您的紀錄"}>
                                      <Trash2 className="w-4 h-4" />
                                    </button>
                                  )}
                                </div>
                              </div>
                            );
                          })}
                          
                          {totalPages > 1 && (
                            <div className="flex justify-between items-center pt-3 mt-1 border-t border-gray-700/50">
                              <button onClick={() => setModalPage(p => Math.max(1, p - 1))} disabled={safePage === 1} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 disabled:opacity-30 rounded-lg text-sm transition-colors text-white font-medium">上一頁</button>
                              <span className="text-gray-400 text-sm font-medium">第 {safePage} / {totalPages} 頁</span>
                              <button onClick={() => setModalPage(p => Math.min(totalPages, p + 1))} disabled={safePage === totalPages} className="px-4 py-2 bg-gray-700 hover:bg-gray-600 disabled:opacity-30 rounded-lg text-sm transition-colors text-white font-medium">下一頁</button>
                            </div>
                          )}
                        </>
                      );
                    })()}
                  </div>
                </div>
              </div>
            );
          })()}

          <div className="max-w-6xl mx-auto space-y-6">
            
            <header className="flex flex-col md:flex-row md:items-center justify-between bg-gray-800 p-6 rounded-2xl shadow-lg border border-gray-700 gap-4">
              <div className="flex items-center gap-4">
                <div className="w-14 h-14 bg-gray-900 rounded-xl flex items-center justify-center border border-gray-700 overflow-hidden shadow-lg shrink-0">
                  <img src="./logo2.png" alt="Logo" className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
                </div>
                <div>
                  <h1 className="text-2xl font-bold text-white tracking-wide">Waku野王重生計時</h1>
                  <p className="text-gray-400 text-sm mt-1">目前身份：<span className={isAdmin ? 'text-purple-400 font-bold' : 'text-green-400 font-bold'}>{isAdmin ? '管理員' : '一般會員'}</span></p>
                </div>
              </div>
              <div className="flex items-center gap-3 border-t md:border-t-0 border-gray-700 pt-4 md:pt-0">
                <span className="text-gray-300 text-sm">歡迎, <span className="font-bold text-white text-base">{appUser.username}</span></span>
                <button onClick={() => setShowPwdModal(true)} className="ml-2 bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1"><KeyRound className="w-4 h-4"/> 密碼</button>
                <button onClick={onLogout} className="bg-red-600/20 hover:bg-red-600/40 text-red-400 border border-red-500/30 px-3 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-1"><LogOut className="w-4 h-4"/> 登出</button>
              </div>
            </header>

            {isAdmin && (
              <section className="bg-gray-800 p-6 rounded-2xl shadow-lg border border-purple-500/30 ring-1 ring-purple-500/20 animate-in fade-in duration-300">
                <div className="flex items-center gap-2 mb-6 border-b border-gray-700 pb-4 overflow-x-auto">
                  <button onClick={() => setAdminTab('home')} className={`px-4 py-2 rounded-lg text-sm font-bold flex shrink-0 items-center gap-2 transition-colors ${adminTab === 'home' ? 'bg-purple-600 text-white' : 'bg-gray-900 text-gray-400 hover:bg-gray-700'}`}>
                    <MapPin className="w-4 h-4"/> 擊殺登記 / 狀態
                  </button>
                  <button onClick={() => setAdminTab('boss')} className={`px-4 py-2 rounded-lg text-sm font-bold flex shrink-0 items-center gap-2 transition-colors ${adminTab === 'boss' ? 'bg-purple-600 text-white' : 'bg-gray-900 text-gray-400 hover:bg-gray-700'}`}>
                    <Crosshair className="w-4 h-4"/> BOSS 管理
                  </button>
                  <button onClick={() => setAdminTab('users')} className={`px-4 py-2 rounded-lg text-sm font-bold flex shrink-0 items-center gap-2 transition-colors ${adminTab === 'users' ? 'bg-purple-600 text-white' : 'bg-gray-900 text-gray-400 hover:bg-gray-700 relative'}`}>
                    <Users className="w-4 h-4"/> 會員管理
                    {allUsers.filter(u => u.status === 'pending').length > 0 && (
                      <span className="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-gray-800"></span>
                    )}
                  </button>
                </div>

                {adminTab === 'boss' ? (
                  <div className="animate-in fade-in slide-in-from-bottom-2 duration-300">
                    <div className="flex flex-col xl:flex-row xl:items-center justify-between mb-6 gap-4">
                      <div className="flex items-center gap-2 cursor-pointer hover:bg-gray-700/50 p-2 -ml-2 rounded-lg transition-colors select-none" onClick={() => setShowBossForm(!showBossForm)}>
                        <h2 className="text-lg font-semibold flex items-center gap-2 text-purple-400">
                          <UserCog className="w-5 h-5" />
                          {editingTemplateId ? '編輯 BOSS 種類' : '設定 BOSS 種類與外觀'}
                        </h2>
                        {showBossForm ? <ChevronUp className="w-5 h-5 text-purple-400" /> : <ChevronDown className="w-5 h-5 text-purple-400" />}
                      </div>
                      
                      {/* 管理員維修更新時間輸入框 */}
                      <div className="flex flex-col sm:flex-row items-end sm:items-center gap-3">
                        <div className="flex flex-col items-end">
                           <label className="text-[11px] text-gray-400 mb-0.5">自訂基準時間 (維修重置用，留空為現在)</label>
                           <input type="datetime-local" value={globalBaseTime} onChange={e=>setGlobalBaseTime(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-1.5 text-sm text-white focus:outline-none focus:border-purple-500" />
                        </div>
                        <button onClick={handleResetAllBosses} disabled={isResettingGlobal} className="bg-red-600 hover:bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center justify-center gap-2 transition-colors disabled:opacity-50 h-[38px] mt-1 sm:mt-0 w-full sm:w-auto">
                          {isResettingGlobal ? <Activity className="w-4 h-4 animate-spin"/> : <RefreshCw className="w-4 h-4"/>} 全域重置
                        </button>
                      </div>
                    </div>
                    
                    {showBossForm && (
                      <form onSubmit={handleSaveTemplate} className="flex flex-col gap-4 mb-6 bg-gray-900/50 p-4 rounded-xl border border-gray-700">
                        <div className="flex flex-col md:flex-row gap-4 items-start md:items-center">
                          <div className="shrink-0 flex flex-col items-center">
                            <label className="block text-sm text-gray-400 mb-1 w-full text-left">外觀圖</label>
                            <label className="flex items-center justify-center w-16 h-16 md:w-[76px] md:h-[76px] bg-gray-900 border border-gray-600 border-dashed rounded-xl cursor-pointer hover:border-purple-500 hover:bg-purple-500/10 transition-all overflow-hidden group">
                              {newTemplateImage ? <img src={newTemplateImage} alt="Preview" className="w-full h-full object-cover" /> : <div className="text-gray-500 group-hover:text-purple-400 flex flex-col items-center"><Upload className="w-5 h-5 mb-0.5" /><span className="text-[10px]">上傳</span></div>}
                              <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload} />
                            </label>
                          </div>
                          
                          <div className="flex-1 w-full grid grid-cols-2 md:grid-cols-4 gap-3">
                            <div className="col-span-2 md:col-span-1">
                              <label className="block text-sm text-gray-400 mb-1">BOSS 名稱</label>
                              <input type="text" value={newTemplateName} onChange={(e) => setNewTemplateName(e.target.value)} placeholder="例如: 巴洛古" className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" required />
                            </div>
                            <div className="col-span-2 md:col-span-1">
                              <label className="block text-sm text-gray-400 mb-1">等級 (Lv)</label>
                              <input type="number" min="1" value={newTemplateLevel} onChange={(e) => setNewTemplateLevel(e.target.value)} placeholder="例如: 80" className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" />
                            </div>
                            <div className="col-span-1 md:col-span-1">
                              <label className="block text-sm text-gray-400 mb-1">最小CD(分)</label>
                              <input type="number" min="1" value={newTemplateMinCD} onChange={(e) => setNewTemplateMinCD(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" required />
                            </div>
                            <div className="col-span-1 md:col-span-1">
                              <label className="block text-sm text-gray-400 mb-1">最大CD(分)</label>
                              <input type="number" min="1" value={newTemplateMaxCD} onChange={(e) => setNewTemplateMaxCD(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-3 py-2.5 text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all" required />
                            </div>
                          </div>
                        </div>
                        
                        <div className="flex items-center justify-end gap-2 border-t border-gray-800 pt-3">
                          {editingTemplateId && <button type="button" onClick={handleCancelEdit} className="bg-gray-700 hover:bg-gray-600 text-white font-medium px-4 py-2 rounded-lg transition-colors flex items-center justify-center">取消</button>}
                          <button type="submit" disabled={isAddingTemplate} className="bg-purple-600 hover:bg-purple-500 text-white font-medium px-6 py-2 rounded-lg transition-colors disabled:opacity-50 flex items-center justify-center gap-2 shadow-lg shadow-purple-900/20">
                            {isAddingTemplate ? <Activity className="w-5 h-5 animate-spin" /> : (editingTemplateId ? '儲存修改' : '新增種類')}
                          </button>
                        </div>
                      </form>
                    )}

                    {/* 管理員 Boss 列表排序 */}
                    <div className="flex justify-between items-center pt-4 border-t border-gray-700 mb-4">
                       <h3 className="text-gray-300 font-bold ml-1">現有 BOSS ({bossTemplates.length})</h3>
                       <select value={adminSortOrder} onChange={(e) => setAdminSortOrder(e.target.value)} className="bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-purple-500">
                         <option value="name">依名稱排序</option>
                         <option value="levelDesc">等級 (高到低)</option>
                         <option value="levelAsc">等級 (低到高)</option>
                       </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                      {sortedAdminTemplates.map(template => (
                        <div key={template.id} className="flex flex-col bg-gray-900 border border-gray-700 rounded-xl p-4 gap-3 relative hover:border-purple-500/50 transition-colors">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-3">
                              {template.imageUrl ? <img src={template.imageUrl} alt={template.name} className="w-10 h-10 rounded-full object-cover border border-gray-700 bg-gray-800" /> : <div className="w-10 h-10 rounded-full bg-gray-800 flex items-center justify-center border border-gray-700"><ImageIcon className="w-5 h-5 text-gray-500" /></div>}
                              <div className="flex flex-col">
                                <span className="font-bold text-gray-200">
                                  {template.name} {template.level && <span className="text-yellow-400 text-sm ml-1">Lv.{template.level}</span>}
                                </span>
                                <span className="text-gray-500 text-xs">CD: {template.minCooldown || template.cooldownMinutes}{template.maxCooldown && template.maxCooldown !== (template.minCooldown || template.cooldownMinutes) ? `~${template.maxCooldown}` : ''}分鐘</span>
                              </div>
                            </div>
                            <div className="flex items-center gap-1">
                              <button onClick={() => handleEditClick(template)} className="text-gray-500 hover:text-blue-400 transition-colors p-1.5 rounded bg-gray-800 hover:bg-gray-700"><Edit2 className="w-4 h-4" /></button>
                              <button onClick={() => handleDeleteTemplate(template.id)} className="text-gray-500 hover:text-red-400 transition-colors p-1.5 rounded bg-gray-800 hover:bg-gray-700"><Trash2 className="w-4 h-4" /></button>
                            </div>
                          </div>
                          
                          <div className="flex items-center gap-2 pt-3 border-t border-gray-800">
                            <button onClick={() => handleGlobalResetSingle(template)} className="flex-1 flex items-center justify-center gap-1 text-xs font-medium bg-orange-500/10 text-orange-400 border border-orange-500/20 hover:bg-orange-500/20 px-2 py-1.5 rounded transition-colors" title="套用上方自訂基準時間"><RefreshCw className="w-3 h-3"/> 維修重置</button>
                            <button onClick={() => handleGlobalSpawnSingle(template)} className="flex-1 flex items-center justify-center gap-1 text-xs font-medium bg-green-500/10 text-green-400 border border-green-500/20 hover:bg-green-500/20 px-2 py-1.5 rounded transition-colors"><CheckCircle className="w-3 h-3"/> 標記重生</button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ) : adminTab === 'users' ? (
                  <div className="animate-in fade-in slide-in-from-bottom-2 duration-300 space-y-3">
                     <div className="flex items-center justify-between cursor-pointer hover:bg-gray-700/50 p-2 -mx-2 rounded-lg transition-colors select-none mb-2" onClick={() => setShowUserList(!showUserList)}>
                       <h2 className="text-lg font-semibold flex items-center gap-2 text-purple-400"><Users className="w-5 h-5" /> 系統註冊會員 ({allUsers.length})</h2>
                       {showUserList ? <ChevronUp className="w-5 h-5 text-purple-400" /> : <ChevronDown className="w-5 h-5 text-purple-400" />}
                     </div>
                     
                     {showUserList && (
                       allUsers.length === 0 ? (
                         <p className="text-gray-500 text-center py-6">目前尚無其他會員。</p>
                       ) : (
                         allUsers.map(u => <AdminUserRow key={u.id} user={u} appUser={appUser} showMessage={showMessage} />)
                       )
                     )}
                  </div>
                ) : null}
              </section>
            )}

            {(!isAdmin || adminTab === 'home') && (
              <>
                <section className="bg-gray-800 p-6 rounded-2xl shadow-lg border border-blue-500/30 relative z-10 animate-in fade-in duration-300">
                  <h2 className="text-lg font-semibold mb-4 flex items-center gap-2 text-blue-400">
                    <Crosshair className="w-5 h-5" />
                    回報擊殺紀錄
                  </h2>
                  {bossTemplates.length === 0 ? (
                    <div className="text-center py-6 text-gray-400 bg-gray-900 rounded-lg border border-gray-700">
                      系統目前尚未設定任何 BOSS 種類。
                    </div>
                  ) : (
                    <form onSubmit={handleReportKill} className="flex flex-col md:flex-row gap-4 items-end">
                      <div className="w-full md:w-48">
                        <label className="block text-sm text-gray-400 mb-1">搜尋王</label>
                        <div className="relative">
                          <Search className="w-4 h-4 text-gray-500 absolute left-3 top-1/2 -translate-y-1/2" />
                          <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} placeholder="輸入關鍵字..." className="w-full bg-gray-900 border border-gray-700 rounded-lg pl-9 pr-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all h-[52px]" />
                        </div>
                      </div>
                      <div className="flex-1 w-full">
                        <label className="block text-sm text-gray-400 mb-1">選擇 BOSS 種類</label>
                        <select value={selectedTemplateId} onChange={(e) => setSelectedTemplateId(e.target.value)} className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all h-[52px]" required>
                          {filteredTemplates.length > 0 ? filteredTemplates.map(t => <option key={t.id} value={t.id}>{t.name} {t.level ? `Lv.${t.level}` : ''} (CD: {t.minCooldown || t.cooldownMinutes}{t.maxCooldown && t.maxCooldown !== (t.minCooldown || t.cooldownMinutes) ? `~${t.maxCooldown}` : ''}分)</option>) : <option value="">找不到符合的王</option>}
                        </select>
                      </div>
                      <div className="w-full md:w-28">
                        <label className="block text-sm text-gray-400 mb-1">分流</label>
                        <input type="text" value={channelInput} onChange={(e) => setChannelInput(e.target.value)} placeholder="例如: 3" className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all h-[52px]" required />
                      </div>
                      <div className="w-full md:w-auto mt-2 md:mt-0">
                        <button type="submit" disabled={isReporting || !selectedTemplateId} className="w-full md:w-auto bg-blue-600 hover:bg-blue-500 text-white font-bold px-8 py-3 h-[52px] rounded-lg transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center shadow-lg shadow-blue-900/20">
                          {isReporting ? '處理中' : '開始倒數'}
                        </button>
                      </div>
                    </form>
                  )}
                </section>

                <section className="space-y-4 animate-in fade-in duration-300">
                  {/* 玩家視角 BOSS 列表 Header 排序 */}
                  <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 px-2">
                    <div className="flex flex-col sm:flex-row sm:items-center gap-3">
                      <h2 className="text-xl font-bold text-gray-200 flex items-center gap-2">
                        <Clock className="w-6 h-6 text-yellow-500" />
                        各頻道 BOSS 狀態
                      </h2>
                      <div className="flex items-center gap-3 text-[11px] font-medium text-gray-400 bg-gray-800 border border-gray-700 rounded-lg px-2.5 py-1">
                        <span className="flex items-center gap-1 text-red-400"><div className="w-2 h-2 rounded bg-red-500/80"></div> 10分內重生</span>
                        <span className="flex items-center gap-1 text-yellow-400"><div className="w-2 h-2 rounded bg-yellow-500/80"></div> 可能重生</span>
                      </div>
                    </div>
                    <select value={bossSort} onChange={e=>setBossSort(e.target.value)} className="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 w-full sm:w-auto">
                      <option value="levelAsc">等級低到高</option>
                      <option value="levelDesc">等級高到低</option>
                      <option value="earliest">CD時間排序</option>
                      <option value="hasRecordOnly">顯示有紀錄Boss</option>
                    </select>
                  </div>

                  {displayBosses.length === 0 ? (
                    <div className="text-center py-16 bg-gray-800 rounded-2xl border border-gray-700 border-dashed">
                      <Skull className="w-12 h-12 text-gray-600 mx-auto mb-3" />
                      <p className="text-gray-400">目前沒有符合條件的重生資訊。</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                      {displayBosses.map(group => {
                        const { text: earliestText, state: earliestState } = formatCountdown(group.earliestSpawn, group.earliestMaxSpawn);
                        const isPinned = pinnedBosses.includes(group.id);
                        
                        // 計算即將重生的分流數量（10分鐘內）
                        const warningCount = group.channels.filter(ch => {
                          const diff = ch.nextSpawn - now;
                          return diff > 0 && diff <= 10 * 60 * 1000;
                        }).length;

                        return (
                          <div key={group.id} onClick={() => setActiveModalBossId(group.id)} className={`bg-gray-800 rounded-2xl border transition-all duration-300 overflow-hidden cursor-pointer hover:scale-[1.01] active:scale-[0.99] relative ${earliestState === 'spawned' ? 'border-green-500/50 shadow-[0_0_15px_rgba(34,197,94,0.1)]' : earliestState === 'floating' ? 'border-yellow-500/50 shadow-[0_0_15px_rgba(234,179,8,0.1)]' : warningCount > 0 ? 'border-red-500/40 shadow-[0_0_10px_rgba(239,68,68,0.1)]' : 'border-gray-700 hover:border-gray-500'} ${isPinned ? 'ring-1 ring-yellow-500/30 bg-gray-800/90' : ''}`}>
                            
                            <button onClick={(e) => togglePin(e, group.id)} className="absolute top-2 right-2 p-1.5 rounded-full bg-gray-900/50 hover:bg-gray-700 transition-colors z-20 group" title={isPinned ? "取消釘選" : "釘選置頂"}>
                               <Star className={`w-4 h-4 transition-all ${isPinned ? 'fill-yellow-500 text-yellow-500' : 'text-gray-500 group-hover:text-yellow-400'}`} />
                            </button>

                            <div className="p-4 sm:p-5 flex items-center justify-between select-none bg-gray-800 hover:bg-gray-750 transition-colors">
                              <div className="flex items-center gap-4">
                                <div className={`flex shrink-0 w-12 h-12 sm:w-14 sm:h-14 rounded-xl bg-gray-900 items-center justify-center border overflow-hidden ${earliestState === 'spawned' ? 'border-green-500/40' : earliestState === 'floating' ? 'border-yellow-500/40' : warningCount > 0 ? 'border-red-500/40' : 'border-gray-700'}`}>
                                  {group.imageUrl ? <img src={group.imageUrl} alt={group.name} className="w-full h-full object-cover" /> : <Skull className={`w-6 h-6 ${earliestState === 'spawned' ? 'text-green-400' : earliestState === 'floating' ? 'text-yellow-400' : warningCount > 0 ? 'text-red-400' : 'text-gray-500'}`} />}
                                </div>
                                <div>
                                  <h3 className="text-lg sm:text-xl font-bold text-white flex items-center flex-wrap gap-2 pr-6">
                                    {group.name} {group.level && <span className="text-yellow-400 text-sm sm:text-base">Lv.{group.level}</span>}
                                    {group.channels.length > 0 && <span className="text-xs bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full border border-blue-500/30">{group.channels.length} 分流</span>}
                                    {warningCount > 0 && <span className="text-[11px] font-bold bg-red-500 text-white px-2 py-0.5 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.8)] animate-pulse">{warningCount} 將重生</span>}
                                  </h3>
                                  <div className="text-sm mt-1 flex items-center gap-1.5 sm:gap-2">
                                    <span className="text-gray-400 hidden sm:inline">{earliestState === 'waiting' ? '最快重生:' : '狀態:'}</span>
                                    <span className={`font-mono ${earliestState === 'spawned' ? 'text-green-400 font-bold drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]' : earliestState === 'floating' ? 'text-yellow-400 font-bold drop-shadow-[0_0_5px_rgba(250,204,21,0.3)]' : 'text-red-400'}`}>
                                      {earliestText} 
                                    </span>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </section>
              </>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 5. 總控 App (身分驗證與路由)
    // ==========================================
    function App() {
      const [appUser, setAppUser] = useState(null);
      const [isCheckingAuth, setIsCheckingAuth] = useState(true);
      const [alertMsg, setAlertMsg] = useState(null); // { text, type }

      const showMessage = (text, type = 'error') => {
        setAlertMsg({ text, type });
        setTimeout(() => setAlertMsg(null), 5000);
      };

      // 檢查本機登入狀態與同步資料庫會員狀態
      useEffect(() => {
        const storedUserId = localStorage.getItem('wakuboss_user_id');
        if (!storedUserId) {
          setIsCheckingAuth(false);
          return;
        }
        
        // 監聽此用戶在資料庫中的變化 (若管理員將他停權，畫面會即時踢出或回到審核畫面)
        const unsub = onSnapshot(doc(db, 'users', storedUserId), (docSnap) => {
          if (docSnap.exists()) {
            setAppUser({ id: docSnap.id, ...docSnap.data() });
          } else {
            setAppUser(null);
            localStorage.removeItem('wakuboss_user_id');
          }
          setIsCheckingAuth(false);
        });

        return () => unsub();
      }, []);

      const handleLogout = () => {
        localStorage.removeItem('wakuboss_user_id');
        setAppUser(null);
        showMessage('已成功登出', 'success');
      };

      return (
        <>
          {/* 全域通知提示區 */}
          {alertMsg && (
            <div className={`fixed top-4 right-4 z-[99] px-5 py-4 rounded-xl flex items-center gap-4 shadow-2xl animate-in slide-in-from-top-4 border ${
              alertMsg.type === 'success' ? 'bg-green-900/90 border-green-500 text-green-100' : 'bg-red-900/90 border-red-500 text-red-100'
            } bg-gray-900/95`}>
              <span className="flex items-center gap-2 font-medium">
                {alertMsg.type === 'success' ? <CheckCircle className="w-5 h-5 text-green-400"/> : <ShieldAlert className="w-5 h-5 text-red-400"/>} 
                {alertMsg.text}
              </span>
              <button onClick={() => setAlertMsg(null)} className="text-white/60 hover:text-white transition-colors"><X className="w-5 h-5"/></button>
            </div>
          )}

          {/* 路由判斷 */}
          {isCheckingAuth ? (
            <div className="min-h-screen flex items-center justify-center">
              <Activity className="w-12 h-12 text-blue-500 animate-spin" />
            </div>
          ) : !appUser ? (
            <AuthScreen setAppUser={setAppUser} showMessage={showMessage} />
          ) : appUser.status === 'pending' ? (
            <PendingScreen onLogout={handleLogout} />
          ) : (
            <MainApp appUser={appUser} onLogout={handleLogout} showMessage={showMessage} />
          )}
        </>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
