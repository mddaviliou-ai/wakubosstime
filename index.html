  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",

</head>
<body class="bg-gray-900 text-white min-h-screen">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, memo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { createPortal } from 'react-dom'; // 匯入 createPortal 用於子母畫面渲染
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously } from 'firebase/auth';
    import { getFirestore, collection, addDoc, onSnapshot, doc, setDoc, deleteDoc, updateDoc, getDocs, query, where } from 'firebase/firestore';
    import { Clock, History, Activity, Trash2, ShieldAlert, Crosshair, Skull, UserCog, Users, MapPin, ChevronDown, ChevronUp, Search, Image as ImageIcon, Upload, Edit2, X, Flame, RefreshCw, CheckCircle, Server, LogOut, KeyRound, Save, Star, Eye, EyeOff, Power, Ban, Moon, Settings, PictureInPicture } from 'lucide-react';

    const firebaseConfig = {
      apiKey: "AIzaSyD763KJlKWIEXHCjXcQD3WXxup7DPZbh7Y",
      authDomain: "wakubosstime.firebaseapp.com",
      projectId: "wakubosstime",
      storageBucket: "wakubosstime.firebasestorage.app",
      messagingSenderId: "1005300815484",
      appId: "1:1005300815484:web:2a7724c6f7f0e239839bf9"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    signInAnonymously(auth).catch(console.error);

    const CountdownTimer = memo(({ nextSpawnTime, maxSpawnTime }) => {
      const [now, setNow] = useState(Date.now());
      
      useEffect(() => {
        const timer = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(timer);
      }, []);

      if (nextSpawnTime === null || nextSpawnTime === undefined || nextSpawnTime === '') return <span className="text-gray-400">未知</span>;
      if (nextSpawnTime === 0) return <span className="font-mono tracking-wide text-green-400 font-bold drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]">🟢 確定重生</span>;
      
      const diffMin = nextSpawnTime - now;
      const diffMax = (maxSpawnTime || nextSpawnTime) - now;
      
      const pad = (n) => String(n).padStart(2, '0');
      const formatTime = (diff) => {
        const h = Math.floor(diff / (1000 * 60 * 60));
        const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diff % (1000 * 60)) / 1000);
        return `${pad(h)}:${pad(m)}:${pad(s)}`;
      };

      if (diffMin > 0) {
        return <span className="font-mono tracking-wide text-gray-300">{formatTime(diffMin)}</span>;
      } else if (diffMax > 0) {
        return <span className="font-mono tracking-wide text-yellow-400 font-bold drop-shadow-[0_0_5px_rgba(250,204,21,0.3)]">{formatTime(diffMax)}</span>;
      } else {
        return <span className="font-mono tracking-wide text-green-400 font-bold drop-shadow-[0_0_5px_rgba(74,222,128,0.3)]">🟢 確定重生</span>;
      }
    });

    function AdminUserRow({ user, appUser, showMessage, requestConfirm }) {
      const [uName, setUName] = useState(user.username);
      const [uPwd, setUPwd] = useState(user.password);
      const [canClearStale, setCanClearStale] = useState(user.canClearStale || false);
      const [canClearAll, setCanClearAll] = useState(user.canClearAll || false);
      const [showPwd, setShowPwd] = useState(false);
      const isSelf = user.id === appUser.id;

      const handleSave = async () => {
        if (!uName.trim() || !uPwd.trim()) return showMessage('欄位不可空白', 'error');
        try {
          await updateDoc(doc(db, 'users', user.id), { 
            username: uName.trim(), 
            password: uPwd.trim(),
            canClearStale: canClearStale,
            canClearAll: canClearAll
          });
          showMessage(`已更新 ${uName} 的資料`, 'success');
        } catch (e) { showMessage('更新失敗', 'error'); }
      };

      const handleToggleStatus = async () => {
        if (isSelf) return showMessage('無法更改自己的狀態', 'error');
        const newStatus = user.status === 'approved' ? 'pending' : 'approved';
        await updateDoc(doc(db, 'users', user.id), { status: newStatus });
        showMessage(`已將 ${user.username} 設為 ${newStatus === 'approved' ? '開通' : '停權'}`, 'success');
      };

      const handleDeleteUser = async () => {
        if (isSelf) return showMessage('無法刪除自己的帳號', 'error');
        requestConfirm(`確定要永久刪除會員「${user.username}」嗎？此操作無法還原。`, async () => {
          try {
            await deleteDoc(doc(db, 'users', user.id));
            showMessage(`已刪除會員 ${user.username}`, 'success');
          } catch(e) {
            showMessage('刪除失敗', 'error');
          }
        });
      };

      return (
        <div className="flex flex-col md:flex-row items-center gap-3 p-3 bg-gray-900 border border-gray-700 rounded-xl hover:border-purple-500/50 transition-colors shrink-0">
          <div className="flex flex-col w-full md:w-[160px] shrink-0">
             <label className="text-[10px] text-gray-500 mb-0.5">帳號 (DC名稱)</label>
             <input type="text" value={uName} onChange={e=>setUName(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg px-2.5 py-1.5 text-white text-sm focus:outline-none focus:border-purple-500" />
          </div>
          <div className="flex flex-col w-full md:w-[140px] shrink-0 relative">
             <label className="text-[10px] text-gray-500 mb-0.5">登入密碼</label>
             <div className="relative">
               <input type={showPwd ? "text" : "password"} value={uPwd} onChange={e=>setUPwd(e.target.value)} className="w-full bg-gray-800 border border-gray-600 rounded-lg pl-2.5 pr-8 py-1.5 text-white text-sm focus:outline-none focus:border-purple-500" />
               <button onClick={() => setShowPwd(!showPwd)} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-200">
                 {showPwd ? <EyeOff className="w-4 h-4"/> : <Eye className="w-4 h-4"/>}
               </button>
             </div>
          </div>
          
          <div className="flex flex-col w-full md:w-auto md:ml-2">
            <label className="text-[10px] text-gray-500 mb-0.5">進階權限</label>
            <div className="flex items-center gap-2">
              <label className="flex items-center gap-1.5 cursor-pointer bg-gray-800 border border-gray-600 rounded-lg px-2.5 py-1.5 hover:border-purple-500 transition-colors">
                <input type="checkbox" checked={canClearStale} onChange={e=>setCanClearStale(e.target.checked)} className="w-3.5 h-3.5 accent-purple-500 rounded border-gray-600" />
                <span className="text-sm text-gray-300">清4hr紀錄</span>
              </label>
              <label className="flex items-center gap-1.5 cursor-pointer bg-gray-800 border border-gray-600 rounded-lg px-2.5 py-1.5 hover:border-red-500 transition-colors">
                <input type="checkbox" checked={canClearAll} onChange={e=>setCanClearAll(e.target.checked)} className="w-3.5 h-3.5 accent-red-500 rounded border-gray-600" />
                <span className="text-sm text-gray-300">清單王全部</span>
              </label>
            </div>
          </div>

          <div className="flex items-end gap-1.5 w-full md:w-auto mt-2 md:mt-0 md:pt-[18px]">
            <button onClick={handleSave} className="bg-gray-700 hover:bg-purple-600 text-white p-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="儲存修改"><Save className="w-4 h-4"/></button>
            {!isSelf && (
               <button onClick={handleDeleteUser} className="bg-gray-700 hover:bg-red-600 text-gray-300 hover:text-white p-1.5 rounded-lg transition-colors flex items-center justify-center shrink-0" title="刪除會員"><Trash2 className="w-4 h-4"/></button>
            )}
          </div>
          
          <div className="flex flex-1 items-end gap-2 w-full mt-2 md:mt-0 md:pt-[18px] md:justify-end">
             <button onClick={handleToggleStatus} disabled={isSelf} className={`px-3 py-1.5 rounded-lg text-xs font-bold w-full md:w-auto transition-colors ${user.status === 'approved' ? 'bg-green-600/20 text-green-400 border border-green-500/50 hover:bg-green-600/30' : 'bg-red-600/20 text-red-400 border border-red-500/50 hover:bg-red-600/30 animate-pulse'} disabled:opacity-50 disabled:grayscale`}>
               {user.status === 'approved' ? '🟢 已開通 (點擊停權)' : '🔴 審核中 (點擊開通)'}
             </button>
          </div>
        </div>
      );
    }

    function AuthScreen({ setAppUser, showMessage }) {
      const [isLogin, setIsLogin] = useState(true);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const trimmedUser = username.trim();
        if (!trimmedUser) return;
        setIsLoading(true);

        try {
          if (isLogin) {
            const q = query(collection(db, 'users'), where('username', '==', trimmedUser));
            const snap = await getDocs(q);
            
            if (snap.empty) {
              if (trimmedUser === '茶米' && password === 'zaza') {
                const docRef = await addDoc(collection(db, 'users'), {
                  username: '茶米', password: 'zaza', role: 'admin', status: 'approved', createdAt: Date.now(), canClearStale: true
                });
                const adminUser = { id: docRef.id, username: '茶米', role: 'admin', status: 'approved', canClearStale: true };
                localStorage.setItem('wakuboss_user_id', docRef.id);
                setAppUser(adminUser);
                showMessage('管理員帳號已自動建立並登入', 'success');
                return;
              }
              showMessage('找不到此帳號，請確認或前往註冊', 'error');
              setIsLoading(false);
              return;
            }

            let foundUser = null;
            snap.forEach(d => { if (d.data().password === password) foundUser = { id: d.id, ...d.data() }; });
            
            if (foundUser) {
              localStorage.setItem('wakuboss_user_id', foundUser.id);
              setAppUser(foundUser);
              showMessage(`歡迎回來，${foundUser.username}`, 'success');
            } else {
              showMessage('密碼錯誤', 'error');
            }
          } else {
            const q = query(collection(db, 'users'), where('username', '==', trimmedUser));
            const snap = await getDocs(q);
            if (!snap.empty) {
              showMessage('此帳號已被註冊', 'error');
              setIsLoading(false);
              return;
            }

            const pass = password || '1234'; 
            const isAdmin = trimmedUser === '茶米' && pass === 'zaza';
            
            const newUser = {
              username: trimmedUser,
              password: pass,
              role: isAdmin ? 'admin' : 'user',
              status: isAdmin ? 'approved' : 'pending',
              canClearStale: isAdmin ? true : false,
              createdAt: Date.now(),
              forceKicked: false,
              forceRefresh: false
            };

            const docRef = await addDoc(collection(db, 'users'), newUser);
            localStorage.setItem('wakuboss_user_id', docRef.id);
            setAppUser({ id: docRef.id, ...newUser });
            showMessage(isAdmin ? '管理員註冊成功' : '註冊成功，請等待管理員開通', 'success');
          }
        } catch (error) {
          console.error(error);
          showMessage('發生錯誤，請確認網路連線或資料庫權限', 'error');
        } finally {
          setIsLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 w-full max-w-md animate-in zoom-in-95 duration-300">
            <div className="flex flex-col items-center mb-8">
              <div className="w-20 h-20 mb-4 bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-700 overflow-hidden shadow-lg">
                <img src="./logo2.png" alt="Logo" className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
              </div>
              <h1 className="text-2xl font-bold text-white tracking-wide">Waku野王重生計時</h1>
              <p className="text-gray-400 mt-2">{isLogin ? '登入以繼續使用' : '註冊新帳號'}</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm text-gray-400 mb-1">帳號</label>
                <input type="text" value={username} onChange={e => setUsername(e.target.value)} placeholder={isLogin ? "請輸入帳號" : "建議填寫 DC 名稱"} className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" required />
              </div>
              <div>
                <label className="block text-sm text-gray-400 mb-1">密碼</label>
                <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder={isLogin ? "請輸入密碼" : "未填寫則預設為 1234"} className="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all" />
              </div>
              
              <button type="submit" disabled={isLoading} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-blue-900/30 flex justify-center items-center gap-2 mt-4 disabled:opacity-50">
                {isLoading && <Activity className="w-5 h-5 animate-spin" />}
                {isLogin ? '登入' : '註冊'}
              </button>
            </form>

            <div className="mt-6 text-center text-gray-400 text-sm">
              {isLogin ? '還沒有帳號嗎？' : '已經有帳號了？'}
              <button onClick={() => { setIsLogin(!isLogin); setUsername(''); setPassword(''); }} className="text-blue-400 hover:text-blue-300 ml-2 font-medium underline underline-offset-4 transition-colors">
                {isLogin ? '立即註冊' : '返回登入'}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function PendingScreen({ onLogout }) {
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-gray-800 p-8 rounded-3xl shadow-2xl border border-gray-700 text-center max-w-sm animate-in fade-in duration-500">
            <UserCog className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
            <h2 className="text-xl font-bold text-white mb-2">帳號審核中</h2>
            <p className="text-gray-400 mb-8 leading-relaxed">您的帳號尚未開通或處於停權狀態。<br/>若系統維護中也可能暫時顯示此畫面，請耐心等候。</p>
            <button onClick={onLogout} className="bg-gray-700 hover:bg-gray-600 text-white px-6 py-2.5 rounded-xl font-medium transition-colors flex items-center justify-center gap-2 mx-auto">
              <LogOut className="w-4 h-4" /> 登出並返回
            </button>
          </div>
        </div>
      );
    }

    // 將 alertMsg 與 setAlertMsg 傳入 MainApp，讓 MainApp 也能在 PiP 渲染它
    function MainApp({ appUser, onLogout, showMessage, alertMsg, setAlertMsg }) {
      const isAdmin = appUser.role === 'admin';
      const canDeleteStale = isAdmin || appUser.canClearStale;
      const canDeleteAll = isAdmin || appUser.canClearAll;
      
      const [confirmDialog, setConfirmDialog] = useState({ isOpen: false, message: '', onConfirm: null });
      const requestConfirm = (message, onConfirm) => {
        setConfirmDialog({ isOpen: true, message, onConfirm });
      };

      const [bossTemplates, setBossTemplates] = useState([]);
      const [activeBosses, setActiveBosses] = useState([]);
      const [allUsers, setAllUsers] = useState([]); 
      
      const [isSleeping, setIsSleeping] = useState(false);
      const [uiTick, setUiTick] = useState(0);
      const [sysSettings, setSysSettings] = useState({ autoClearEnabled: false, autoClearHours: 4, autoClearInterval: 1 });

      const [activeModalBossId, setActiveModalBossId] = useState(() => localStorage.getItem('wakuboss_active_modal') || null); 
      const [modalPage, setModalPage] = useState(1); 
      const [adminTab, setAdminTab] = useState('home'); 
      const [showPwdModal, setShowPwdModal] = useState(false);
      const [newPwd, setNewPwd] = useState('');
      const [patrolModalData, setPatrolModalData] = useState(null); 
      const [expandedMemoId, setExpandedMemoId] = useState(null); 
      const [isReportFormCollapsed, setIsReportFormCollapsed] = useState(() => localStorage.getItem('wakuboss_form_collapsed') === 'true');
      
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedTemplateId, setSelectedTemplateId] = useState('');
      const [channelInput, setChannelInput] = useState('');
      const [memoInput, setMemoInput] = useState('');
      const [killTimeInput, setKillTimeInput] = useState('');
      const [killDateSelect, setKillDateSelect] = useState('today');

      const [modalChannelInput, setModalChannelInput] = useState('');
      const [modalMemoInput, setModalMemoInput] = useState('');
      const [modalKillTimeInput, setModalKillTimeInput] = useState('');
      const [modalKillDateSelect, setModalKillDateSelect] = useState('today');

      const [pinnedBosses, setPinnedBosses] = useState(() => {
        const saved = localStorage.getItem(`wakuboss_pinned_${appUser.id}`);
        return saved ? JSON.parse(saved) : [];
      });
      
      const [localPatrols, setLocalPatrols] = useState(() => {
        const saved = localStorage.getItem(`wakuboss_local_patrols_${appUser.id}`);
        return saved ? JSON.parse(saved) : {};
      });

      // === 子母畫面 (PiP) 狀態 ===
      const [pipWindow, setPipWindow] = useState(null);
      const [pipContainer, setPipContainer] = useState(null);
      const [showPipBossSelector, setShowPipBossSelector] = useState(false);
      const [pipSearchQuery, setPipSearchQuery] = useState('');
      const [pipBossSort, setPipBossSort] = useState(() => localStorage.getItem('wakuboss_pip_sort') || 'earliest');

      const longPressTimer = useRef(null);
      const isLongPress = useRef(false);

      const [bossSort, setBossSort] = useState(() => localStorage.getItem('wakuboss_sort') || 'levelAsc'); 
      const [adminSortOrder, setAdminSortOrder] = useState('levelDesc'); 
      const [newTemplateName, setNewTemplateName] = useState('');
      const [newTemplateLevel, setNewTemplateLevel] = useState('');
      const [newTemplateMinCD, setNewTemplateMinCD] = useState(60);
      const [newTemplateMaxCD, setNewTemplateMaxCD] = useState(60);
      const [newTemplateImage, setNewTemplateImage] = useState(null);
      const [newTemplateEnablePatrol, setNewTemplateEnablePatrol] = useState(false);

      const [isAddingTemplate, setIsAddingTemplate] = useState(false);
      const [editingTemplateId, setEditingTemplateId] = useState(null);
      const [showBossForm, setShowBossForm] = useState(true);
      const [showUserList, setShowUserList] = useState(true);
      const [isReporting, setIsReporting] = useState(false);
      const [isResettingGlobal, setIsResettingGlobal] = useState(false);
      const [globalBaseTime, setGlobalBaseTime] = useState(''); 
      const [staleClearHours, setStaleClearHours] = useState(4);

      // 手機背景保護與狀態儲存
      useEffect(() => {
        if (activeModalBossId) localStorage.setItem('wakuboss_active_modal', activeModalBossId);
        else localStorage.removeItem('wakuboss_active_modal');
      }, [activeModalBossId]);

      useEffect(() => {
        localStorage.setItem('wakuboss_sort', bossSort);
      }, [bossSort]);

      useEffect(() => {
        localStorage.setItem('wakuboss_pip_sort', pipBossSort);
      }, [pipBossSort]);

      useEffect(() => {
        localStorage.setItem('wakuboss_form_collapsed', isReportFormCollapsed);
      }, [isReportFormCollapsed]);

      useEffect(() => {
        const timer = setInterval(() => setUiTick(t => t + 1), 1000);

          }
        };

      const displayBosses = useMemo(() => {
        let processed = bossTemplates.map(template => {
          const channels = activeBosses.filter(b => b.templateId === template.id);
          let effectiveGlobalSpawn = null;
          let effectiveGlobalMaxSpawn = null;
          if (template.globalIsAlive) {
              effectiveGlobalSpawn = 0; effectiveGlobalMaxSpawn = 0;
          } else if (template.globalNextSpawn) {
              effectiveGlobalSpawn = template.globalNextSpawn;
              effectiveGlobalMaxSpawn = template.globalMaxSpawn || template.globalNextSpawn; 
          }

          let earliest = null;
          let earliestMax = null;
          
          if (channels.length > 0) {
            channels.forEach(ch => {
              if (earliest === null || ch.nextSpawn < earliest) {
                  earliest = ch.nextSpawn;
                  earliestMax = ch.maxSpawn || ch.nextSpawn;
              }
            });
          } else {
            earliest = effectiveGlobalSpawn;
            earliestMax = effectiveGlobalMaxSpawn;
          }

          const hasRecord = channels.length > 0;

          return { ...template, channels, effectiveGlobalSpawn, effectiveGlobalMaxSpawn, earliestSpawn: earliest, earliestMaxSpawn: earliestMax, hasRecord };
        });

        // 複製一份陣列，以便 PiP 選單能與主畫面獨立搜尋排序
        let baseProcessed = [...processed];

        if (bossSort === 'hasRecordOnly') {
          processed = processed.filter(b => pinnedBosses.includes(b.id) || b.hasRecord);
        }

        const sortedDisplay = processed.sort((a, b) => {
           const aPinned = pinnedBosses.includes(a.id);
           const bPinned = pinnedBosses.includes(b.id);
           
           if (aPinned && !bPinned) return -1;
           if (!aPinned && bPinned) return 1;

           if (bossSort === 'levelDesc') return (b.level || 0) - (a.level || 0) || a.name.localeCompare(b.name);
           if (bossSort === 'levelAsc' || bossSort === 'hasRecordOnly') return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
           
           const aCD = a.minCooldown || a.cooldownMinutes || Infinity;
           const bCD = b.minCooldown || b.cooldownMinutes || Infinity;
           
           if (aCD === bCD) {
               return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
           }
           
           return aCD - bCD;
        });

        // 獨立為 Pip Selector 處理搜尋與排序
        let pipProcessed = baseProcessed;
        
        if (pipSearchQuery.trim()) {
           pipProcessed = pipProcessed.filter(b => b.name.toLowerCase().includes(pipSearchQuery.toLowerCase()));
        }

        if (pipBossSort === 'hasRecordOnly') {
           pipProcessed = pipProcessed.filter(b => pinnedBosses.includes(b.id) || b.hasRecord);
        }

        const sortedPipDisplay = pipProcessed.sort((a, b) => {
           const aPinned = pinnedBosses.includes(a.id);
           const bPinned = pinnedBosses.includes(b.id);
           
           if (aPinned && !bPinned) return -1;
           if (!aPinned && bPinned) return 1;

           if (pipBossSort === 'levelDesc') return (b.level || 0) - (a.level || 0) || a.name.localeCompare(b.name);
           if (pipBossSort === 'levelAsc' || pipBossSort === 'hasRecordOnly') return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
           
           // pipBossSort === 'earliest'
           const aEarliest = a.earliestSpawn !== null ? a.earliestSpawn : Infinity;
           const bEarliest = b.earliestSpawn !== null ? b.earliestSpawn : Infinity;
           
           if (aEarliest === bEarliest) {
              const aCD = a.minCooldown || a.cooldownMinutes || Infinity;
              const bCD = b.minCooldown || b.cooldownMinutes || Infinity;
              if (aCD === bCD) return (a.level || 0) - (b.level || 0) || a.name.localeCompare(b.name);
              return aCD - bCD;
           }

           return aEarliest - bEarliest;
        });

        return { main: sortedDisplay, pip: sortedPipDisplay };
      }, [bossTemplates, activeBosses, bossSort, pinnedBosses, uiTick, pipSearchQuery, pipBossSort]);

          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_SIZE = 120;
            let width = img.width, height = img.height;
            if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
            else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            setNewTemplateImage(canvas.toDataURL('image/jpeg', 0.8));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
